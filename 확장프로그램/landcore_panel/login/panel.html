
<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜드코어</title>
  <link rel="stylesheet" href="panel.css">
</head>

<body>
  <div class="panel-container">
    <!-- 헤더 -->
    <header class="panel-header">
      <!-- 로그인 성공 상태: header-top-row 위쪽에 노출 -->
      <div id="top-user-strip" class="top-user-strip hidden">
        <div class="top-user-strip-inner">
          <div class="top-user-strip-left">
            <div class="top-user-toggle-wrap">
              <a href="#" id="nickname-toggle" class="nickname-toggle">
                <span class="top-user-person-icon">👤</span>
                <span id="nickname" class="top-user-name">-</span>
              </a>

              <div id="user-info-panel" class="user-info-panel hidden">
                <button type="button" id="user-info-close" class="user-info-close">×</button>

                <div class="user-info-panel-body">
                  <div class="user-info-row">
                    <span class="user-info-label">이름</span>
                    <span id="panel-nickname" class="user-info-value">-</span>
                  </div>

                  <div class="user-info-row">
                    <span class="user-info-label">구독개월(남은일자)</span>
                    <span id="sub-status" class="user-info-value">0개월-0일</span>
                  </div>

                  <div class="user-info-row">
                    <span class="user-info-label">문자충전수</span>
                    <span id="sms-count" class="user-info-value">0</span>
                  </div>

                  <div class="user-info-action-row">
                    <button id="btn-mypage" class="account-mini-btn">마이페이지</button>
                    <button id="btn-charge" class="account-mini-btn">문자충전</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="top-user-strip-right">
            <a href="#" id="btn-logout" class="logout-text-link">로그아웃</a>
          </div>
        </div>
      </div>

      <div class="header-content centered">
        <div class="header-top-row">
          <h1 class="logo">랜드코어 분석기</h1>
        </div>
        <div class="panel-account-wrap">
          <!-- 로그인 성공 상태: header-top-row 위쪽에 노출 -->
          <div id="user-section" class="user-session-wrap hidden">
            <div id="login-links" class="link-buttons hidden">
              <a href="#" id="naver-land-btn" class="link-btn">네이버부동산</a>
              <a href="https://www.youtube.com/@랜드코어-win" target="_blank" class="link-btn">유튜브채널</a>
              <a href="https://open.kakao.com/o/go3wU1ei" target="_blank" class="link-btn">오픈채팅방</a>
              <a href="#" id="guide-btn" class="link-btn guide-link-btn">📖 사용메뉴얼</a>
            </div>
          </div>
          <!-- 비로그인 상태 -->
          <div id="login-section" class="account-card hidden">
            <div class="account-card-desc">랜드코어에 오신걸 환영합니다.</div>
            <button id="btn-login" class="account-login-btn">카카오 로그인</button>
          </div>
        </div>
      </div>
    </header>

    <!-- 도구 섹션 -->
    <div class="tools-section">
      <div class="tools-header">
        <span class="tools-header-title">🛠️ 분석도구</span>
        <div class="tools-header-shortcut">
          <button id="site-shortcut-btn" class="site-shortcut-btn">
            사이트가기 ▼
          </button>

          <div id="site-shortcut-menu" class="site-shortcut-menu hidden">
            <button type="button" class="site-shortcut-item" data-site-url="https://bigdata.sbiz.or.kr/">
              소상공인365
            </button>
            <button type="button" class="site-shortcut-item" data-site-url="https://www.gov.kr/">
              정부24(민원)
            </button>
            <button type="button" class="site-shortcut-item" data-site-url="http://www.iros.go.kr/">
              인터넷등기소
            </button>
            <button type="button" class="site-shortcut-item" data-site-url="https://www.realtyprice.kr/">
              공시가격알리미
            </button>
            <button type="button" class="site-shortcut-item" data-site-url="https://www.hometax.go.kr/">
              홈텍스(세무)
            </button>
          </div>
        </div>
      </div>
      <!-- 도구 버튼 그룹 -->
      <div class="tools-buttons tools-buttons-top">
        <!-- 데이터 분석 드롭다운 -->
        <div class="tool-dropdown">
          <button id="real-auction-btn" class="tool-btn tool-btn-analysis">
            📝 데이터분석 ▼
          </button>
          <div id="real-auction-menu" class="tool-dropdown-menu hidden">
            <button type="button" class="tool-dropdown-item" data-analysis-menu="realdeal">📊 실거래분석</button>
            <button type="button" class="tool-dropdown-item" data-analysis-menu="commercial">🏪 업종분석</button>
            <button type="button" class="tool-dropdown-item" data-analysis-menu="statistics">📈 통계분석</button>
            <button type="button" class="tool-dropdown-item tool-dropdown-item-property-search" data-analysis-menu="propertySearch">🔎 매물검색</button>
          </div>
        </div>

        <button id="baehu-btn" class="tool-btn tool-btn-baehu">
          🧭 배후분석
        </button>

        <button id="calculator-btn" class="tool-btn tool-btn-profit">
          📊 수익률분석
        </button>
      </div>
      <div class="tools-buttons tools-buttons-bottom">
        <div class="tool-dropdown">
          <button id="imjang-analysis-btn" class="tool-btn tool-btn-form" title="현장에 직접 가서 확인하는 임장 분석">
            🚶‍♂️ 임장분석 ▼
          </button>
          <div id="imjang-analysis-menu" class="tool-dropdown-menu hidden">
            <button type="button" class="tool-dropdown-item" data-imjang-menu="checklist">✅ 체크리스트</button>
            <button type="button" class="tool-dropdown-item" data-imjang-menu="formDownload">📁 양식다운</button>
          </div>
        </div>

        <button id="sms-btn" class="tool-btn tool-btn-sms">
          💬 문자보내기
        </button>

        <button id="npl-btn" class="tool-btn tool-btn-npl">
          🚨 NPL검색
        </button>
        <!--        <button id="memo-btn" class="tool-btn">-->
        <!--          📝 메모-->
        <!--        </button>-->
      </div>
    </div>

    <!-- 분석 버튼 영역 -->
    <div class="action-section">
      <div class="btn-group">
        <button id="analyze-btn" class="analyze-btn">
          매물 분석하기
        </button>
          <button id="reset-btn" class="reset-btn" title="초기화">
            <span id="reset-btn-icon" class="reset-btn-icon" aria-hidden="true"></span>
          </button>
      </div>
      <div id="status-bar" class="status-bar hidden"></div>
      <div id="analysis-count" class="analysis-count hidden"></div>
    </div>

    <!-- 결과 테이블 영역 -->
    <div id="results-container" class="results-container">
      <!-- 초기 안내 문구 -->
      <div class="empty-state">
        <p>💡 모든 매물을 보려면<br><strong>직접 스크롤 후</strong> 분석 버튼을 눌러주세요</p>
      </div>
    </div>

    <!-- 엑셀 스타일 테이블 (동적 생성됨) -> results-container 내부에 삽입될 예정 -->

    <!-- 평수 분포 섹션 -->
    <div class="chart-section">
      <div class="section-header">
        <span id="chart-title">✏️ 월세 평수 분포</span>
      </div>
      <div id="area-chart" class="area-chart-container"></div>
    </div>

    <!-- 부동산 중개사 섹션 -->
    <div class="top-agencies-section">
      <button type="button" id="top-agencies-toggle" class="section-header top-agencies-toggle" aria-expanded="false">
        <span>🏠🧑‍💼 중개사 상위목록</span>
        <span id="top-agencies-toggle-icon" class="top-agencies-toggle-icon">▼</span>
      </button>

      <div id="top-agencies" class="top-agencies-list hidden">
      </div>
    </div>

    <!-- 푸터 -->
    <footer class="panel-footer">
      <p class="copyright">Copyright © 2025 <strong>랜드코어</strong> All rights reserved.</p>
      <p class="legal-note">(DOM 수정 없음 · 서버 저장 없음 · 개인정보 수집 없음)</p>
    </footer>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="panel.js"></script>
  <script src="popup_kakao.js"></script>
</body>

</html>
