
<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜드코어</title>
  <link rel="stylesheet" href="panel.css">
  <style>
    /* 사용자 정보 바 스타일 */
    .user-info-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.15);
      padding: 4px 10px;
      border-radius: 20px;
      margin-left: auto; /* 로고와 간격을 띄움 */
      margin-right: 10px;
    }

    .user-detail {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .user-nickname {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .sms-badge {
      font-size: 10px;
      color: #f0f0f0;
      opacity: 0.9;
    }

    .logout-mini-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
    }

    .logout-mini-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .login-msg-card {
      background: #fffbe6;
      border: 1px solid #ffe58f;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      border-radius: 8px;
      margin: 10px;
    }

    .login-mini-link {
      background: #faad14;
      color: #fff;
      border: none;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 5px;
    }
  </style>
</head>

<body>
  <div class="panel-container">
    <!-- 헤더 -->
    <header class="panel-header">
      <div class="header-content centered">
        <div class="header-top-row">
          <h1 class="logo">랜드코어 분석기</h1>

          <div class="header-btn-group">
            <button id="guide-btn" class="guide-btn">📖 사용가이드</button>
          </div>
        </div>
        <!-- 사용자 정보 바 -->
        <div class="header-top-row">
          <div id="user-info-bar" class="user-info-bar hidden">
            <div class="user-detail">
              <span id="nickname" class="user-nickname">-</span>
              <span class="sms-badge">SMS <span id="sms-count">0</span></span>
            </div>
          </div>
        </div>
        <div class="link-buttons">
          <a href="#"  id="naver-land-btn" class="link-btn">네이버부동산</a>
          <a href="https://www.youtube.com/@랜드코어-win" target="_blank" class="link-btn">유튜브채널</a>
          <a href="https://open.kakao.com/o/go3wU1ei" target="_blank" class="link-btn">오픈채팅방</a>
        </div>
      </div>
    </header>

    <!-- 도구 섹션 -->
    <div class="tools-section">
      <div class="tools-header">🛠️ 분석도구</div>
      <div class="tools-buttons">
      <!-- 데이터 분석 드롭다운 -->
      <div class="tool-dropdown">
          <button id="real-auction-btn" class="tool-btn">
            📝 데이터분석 ▼
          </button>
          <div id="real-auction-menu" class="tool-dropdown-menu hidden">
            <button type="button" class="tool-dropdown-item" data-analysis-menu="realdeal">실거래분석</button>
            <button type="button" class="tool-dropdown-item" data-analysis-menu="commercial">업종분석</button>
            <button type="button" class="tool-dropdown-item" data-analysis-menu="statistics">통계분석</button>
          </div>
        </div>
        <button id="calculator-btn" class="tool-btn">
          📊 수익률분석
        </button>
        <button id="baehu-btn" class="tool-btn">
          📝 배후분석
        </button>
<!--        <button id="memo-btn" class="tool-btn">-->
<!--          📝 메모-->
<!--        </button>-->
      </div>
    </div>

    <!-- 분석 버튼 영역 -->
    <div class="action-section">
      <div class="btn-group">
        <button id="analyze-btn" class="analyze-btn">
          매물 분석하기
        </button>
        <button id="reset-btn" class="reset-btn" title="초기화">
          ↺
        </button>
      </div>
      <div id="status-bar" class="status-bar hidden"></div>
      <div id="analysis-count" class="analysis-count hidden"></div>
    </div>

    <!-- 결과 테이블 영역 -->
    <div id="results-container" class="results-container">
      <!-- 초기 안내 문구 -->
      <div class="empty-state">
        <p>💡 모든 매물을 보려면<br><strong>직접 스크롤 후</strong> 분석 버튼을 눌러주세요</p>
      </div>
    </div>

    <!-- 엑셀 스타일 테이블 (동적 생성됨) -> results-container 내부에 삽입될 예정 -->

    <!-- 평수 분포 섹션 -->
    <div class="chart-section">
      <div class="section-header">
        <span id="chart-title">✏️ 월세 평수 분포</span>
      </div>
      <div id="area-chart" class="area-chart-container"></div>
    </div>

    <!-- 부동산 TOP 3 섹션 -->
    <!--
    <div class="top-agencies-section">
      <div class="section-header">
        <span>🏆 부동산 TOP 3</span>
      </div>
      <div id="top-agencies" class="top-agencies-list">
      </div>
    </div>
    -->
    <!-- 히스토리 (숨김 처리하거나 하단에 배치) -->
    <div class="history-section hidden">
      <div id="history-list"></div>
    </div>

    <!-- 푸터 -->
    <footer class="panel-footer">
      <p class="copyright">Copyright © 2025 <strong>랜드코어</strong> All rights reserved.</p>
      <p class="legal-note">(DOM 수정 없음 · 서버 저장 없음 · 개인정보 수집 없음)</p>
    </footer>
  </div>

  <script src="panel.js"></script>
</body>

</html>
