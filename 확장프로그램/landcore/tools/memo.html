
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매물 메모장 - 키다리상남자</title>
    <style>
        :root {
            --primary-purple: #6366f1;
            --primary-dark: #4f46e5;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --bg-surface: #ffffff;
            --bg-subtle: #f8fafc;
            --border-color: #e2e8f0;
            --success-green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-primary);
            font-size: 13px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 15px;
        }

        /* 헤더 - 컴팩트 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-purple);
        }

        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-subtle);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 5px 10px;
            gap: 6px;
        }

        .search-box input {
            border: none;
            background: transparent;
            font-size: 12px;
            width: 140px;
            outline: none;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }

        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 4px 8px;
            font-size: 11px;
        }

        /* 메인 - 엑셀 스타일 */
        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 12px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 12px;
        }

        .card-header {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-purple);
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--bg-subtle);
        }

        /* 엑셀 스타일 테이블 입력 */
        .form-table {
            width: 100%;
            border-collapse: collapse;
        }

        .form-table th,
        .form-table td {
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            font-size: 12px;
        }

        .form-table th {
            background: var(--bg-subtle);
            font-weight: 600;
            color: var(--text-secondary);
            width: 80px;
            text-align: left;
        }

        .form-table input,
        .form-table textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 12px;
            padding: 2px;
            outline: none;
        }

        .form-table input:focus,
        .form-table textarea:focus {
            background: #fffbeb;
        }

        .form-table textarea {
            min-height: 50px;
            resize: vertical;
        }

        .price-cell {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .price-cell input {
            flex: 1;
        }

        .per-pyeong {
            color: #ef4444;
            font-weight: 600;
            font-size: 11px;
            white-space: nowrap;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary-purple);
            padding: 6px;
            background: linear-gradient(135deg, #ede9fe 0%, #fce7f3 100%);
            margin-top: 8px;
        }

        /* 저장 목록 - 엑셀 테이블 */
        .memo-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .memo-table th {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 6px 8px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .memo-table td {
            padding: 5px 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .memo-table tr:hover {
            background: #f1f5f9;
        }

        .memo-table .actions {
            white-space: nowrap;
        }

        .memo-table .actions button {
            padding: 2px 6px;
            font-size: 10px;
            margin-right: 3px;
        }

        .memo-list-wrapper {
            max-height: 400px;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: var(--success-green);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: none;
            z-index: 1000;
        }

        .toast.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-badge {
            background: var(--primary-purple);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 8px;
        }

        @media (max-width: 800px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 헤더 -->
        <header class="header">
            <h1>📝 매물 메모장</h1>
            <div class="header-right">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="search-input" placeholder="검색...">
                </div>
                <button id="save-btn" class="btn btn-primary">💾 저장</button>
                <button id="clear-btn" class="btn btn-secondary">🗑️ 초기화</button>
            </div>
        </header>

        <!-- 메인 -->
        <div class="main-grid">
            <!-- 왼쪽: 입력 폼 -->
            <div class="card">
                <div class="card-header">📋 매물 정보 입력</div>

                <table class="form-table">
                    <tr class="section-title">
                        <td colspan="2">🏢 매물 정보</td>
                    </tr>
                    <tr>
                        <th>매매가격</th>
                        <td class="price-cell"><input type="text" id="price" readonly><span id="price-per-pyeong"
                                class="per-pyeong"></span></td>
                    </tr>
                    <tr>
                        <th>보증금/월세</th>
                        <td class="price-cell"><input type="text" id="rent" readonly><span id="rent-per-pyeong"
                                class="per-pyeong"></span></td>
                    </tr>
                    <tr>
                        <th>면적</th>
                        <td><input type="text" id="area" readonly></td>
                    </tr>
                    <tr>
                        <th>층수</th>
                        <td><input type="text" id="floor" readonly></td>
                    </tr>
                    <tr>
                        <th>소재지</th>
                        <td><input type="text" id="address" readonly></td>
                    </tr>
                    <tr>
                        <th>매물특징</th>
                        <td><input type="text" id="features" readonly></td>
                    </tr>
                    <tr>
                        <th>매물번호</th>
                        <td><input type="text" id="property-no" readonly></td>
                    </tr>

                    <tr class="section-title">
                        <td colspan="2">🏠 중개사 정보</td>
                    </tr>
                    <tr>
                        <th>상호</th>
                        <td><input type="text" id="agency-name" readonly></td>
                    </tr>
                    <tr>
                        <th>전화</th>
                        <td><input type="text" id="agency-phone" readonly></td>
                    </tr>
                    <tr>
                        <th>휴대폰</th>
                        <td><input type="text" id="agency-mobile" readonly></td>
                    </tr>
                    <tr>
                        <th>주소</th>
                        <td><input type="text" id="agency-address" readonly></td>
                    </tr>

                    <tr class="section-title">
                        <td colspan="2">💬 내 메모</td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <textarea id="user-memo" placeholder="권리금, 특이사항 등..."></textarea>
                        </td>
                    </tr>
                </table>
            </div>

            <!-- 오른쪽: 저장 목록 -->
            <div class="card">
                <div class="card-header">
                    📋 저장된 메모 <span id="total-count" class="stat-badge">0건</span>
                </div>

                <div id="memo-list" class="memo-list-wrapper">
                    <div class="empty-state">
                        <p>📝 저장된 메모가 없습니다</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">✅ 저장되었습니다</div>

    <script src="memo.js"></script>
</body>

</html>
