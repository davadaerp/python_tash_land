        const subEl = document.getElementById("wishlist-sub-category");
        if (subEl) {
          subEl.value = data.subCategory || subEl.options?.[0]?.value || "";
        }

        document.getElementById("wishlist-floor").value = data.floor || "";
        document.getElementById("wishlist-building-py").value = data.buildingPy || "";
        document.getElementById("wishlist-case-number").value = data.caseNumber || "";
        document.getElementById("wishlist-case-number").disabled = currentWishlistModalMode === "edit";
        document.getElementById("wishlist-auction-applicant").value = data.auctionApplicant || "";
        document.getElementById("wishlist-auction-method").value = data.auctionMethod || "임의경매";
        document.getElementById("wishlist-appraisal-price").value = formatNumberWithComma(data.appraisalPrice || "");
        document.getElementById("wishlist-bond-max-amount").value = formatNumberWithComma(data.bondMaxAmount || "");
        document.getElementById("wishlist-bond-claim-amount").value = formatNumberWithComma(data.bondClaimAmount || "");
        //
        document.getElementById("wishlist-note").value = data.note || "";
        updateWishlistAreaM2View();

        const resultEl = document.getElementById("wishlist-address-search-result");
        if (resultEl) {
          resultEl.textContent = data.addressSearch
            ? `선택주소: ${data.addressSearch}${data.addressDetail ? " / " + data.addressDetail : ""}`
            : "주소검색 후 선택 결과가 표시됩니다.";
        }
      }

      function buildWishlistPayloadFromRow(row) {
        return {
          addressSearch: [row?.region || "", row?.sigungu_name || "", row?.eub_myeon_dong || ""].filter(Boolean).join(" "),
          addressDetail: row?.address2 || "",
          category: row?.category || "",
          subCategory: row?.building || row?.dangi_name || "",
          floor: row?.floor || "",
          buildingPy: row?.building_py || "",
          buildingM2: row?.building_m2 || "",
          caseNumber: row?.case_number || "",
          auctionApplicant: row?.auction_applicant || "",
          auctionMethod: row?.auction_method || "임의경매",
          appraisalPrice: row?.appraisal_price || "",
          bondMaxAmount: row?.bond_max_amount || "",
          bondClaimAmount: row?.bond_claim_amount || "",
          note: row?.notice_text || row?.extra_info || ""
        };
      }

      async function handleWishlistAddressSearch() {
        const keyword = (document.getElementById("wishlist-address-search")?.value || "").trim();
        const detail = (document.getElementById("wishlist-address-detail")?.value || "").trim();
        const resultEl = document.getElementById("wishlist-address-search-result");

        if (!keyword) {
          if (resultEl) resultEl.textContent = "검색어를 입력하세요.";
          return;
        }

        try {
          const data = await postWishlistCrudApi("address_search", {
            address_search: keyword,
            address_detail: detail
          });

          if (resultEl) {
            resultEl.textContent = data?.message || "주소검색 완료";
          }
        } catch (err) {
          console.error(err);
          if (resultEl) {
            resultEl.textContent = err?.message || "주소검색 중 오류가 발생했습니다.";
          }
        }
      }

      function bindWishlistAddressSearchEvent() {
        const inputEl = document.getElementById("wishlist-address-search");
        const btnEl = document.getElementById("wishlist-address-search-btn");
        const resultEl = document.getElementById("wishlist-address-search-result");

        if (inputEl) {
          inputEl.addEventListener("input", function () {
            const keyword = (this.value || "").trim();

            if (resultEl) {
              resultEl.textContent = keyword
                ? `입력주소: ${keyword}`
                : "주소검색 후 선택 결과가 표시됩니다.";
            }
          });
        }

        if (btnEl) {
          btnEl.addEventListener("click", function () {
            handleWishlistAddressSearch();
          });
        }
      }

      // 관심물건 CRUD API 호출 함수
      async function postWishlistCrudApi(action, payload = {}) {
        const apiUrl = "/api/user/wishlist/crud";

        const requestBody = {
          action,
          ...payload
        };

        console.log("[관심물건 CRUD API 요청]", apiUrl, requestBody);

        const res = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${currentPanelAccessToken}`
          },
          body: JSON.stringify(requestBody)
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || data?.success === false) {
          throw new Error(data?.message || `관심물건 ${action} 실패`);
        }

        return data;
      }

      // 관심물건 CRUD API 요청을 위한 페이로드 빌드 함수
      function buildWishlistCrudPayload(formData, mode = "add") {
        return {
          case_number: mode === "edit"
            ? (currentWishlistEditingRow?.case_number || formData.caseNumber || "")
            : (formData.caseNumber || ""),
          category: formData.category || "",
          building: formData.subCategory || "",
          floor: formData.floor || "",
          building_py: formData.buildingPy || "",
          building_m2: formData.buildingM2 || "",
          auction_applicant: formData.auctionApplicant || "",
          auction_method: formData.auctionMethod || "임의경매",
          appraisal_price: safeDigitsOnly(formData.appraisalPrice || ""),
          bond_max_amount: safeDigitsOnly(formData.bondMaxAmount || ""),
          bond_claim_amount: safeDigitsOnly(formData.bondClaimAmount || ""),
          address_search: formData.addressSearch || "",
          address_detail: formData.addressDetail || "",
          region: formData.region || "",
          sigungu_name: formData.sigunguName || "",
          eub_myeon_dong: formData.eubMyeonDong || "",
          extra_info: formData.note || "",
          notice_text: formData.note || ""
        };
      }

      // 관심물건 저장/수정 처리 함수
      async function handleWishlistSave() {
        const formData = getWishlistFormData();
        console.log("[관심물건 저장/수정 payload]", formData);

        try {
          const ok = confirm("저장하시겠습니까?");
          if (!ok) return;

          const action = currentWishlistModalMode === "edit" ? "update" : "create";
          await postWishlistCrudApi(action, buildWishlistCrudPayload(formData, currentWishlistModalMode));

          alert(currentWishlistModalMode === "edit" ? "수정되었습니다." : "저장되었습니다.");
          closeWishlistModal();
          hideWishlistEditButton();
          await fetchNplData();
        } catch (err) {
          console.error(err);
          alert(err?.message || "관심물건 저장 중 오류가 발생했습니다.");
        }
      }

      async function handleWishlistDelete() {
        if (currentWishlistModalMode !== "edit") return;

        const ok = confirm("삭제하시겠습니까?");
        if (!ok) return;

        try {
          await postWishlistCrudApi("delete", {
            case_number: currentWishlistEditingRow?.case_number || ""
          });

          alert("삭제되었습니다.");
          closeWishlistModal();
          hideWishlistEditButton();
          await fetchNplData();
        } catch (err) {
          console.error(err);
          alert(err?.message || "관심물건 삭제 중 오류가 발생했습니다.");
        }
      }

      function bindWishlistModalEvents() {
        const addBtn = document.getElementById("npl-add-wishlist-btn");
        const editBtn = document.getElementById("npl-edit-wishlist-btn");
        const closeBtn = document.getElementById("wishlist-close-btn");
        const saveBtn = document.getElementById("wishlist-save-btn");
        const deleteBtn = document.getElementById("wishlist-delete-btn");
        const dim = document.getElementById("wishlist-modal-dim");

        bindWishlistNumericFormatter();
        bindWishlistCategoryChangeEvent();

        if (addBtn) {
          addBtn.addEventListener("click", function () {
            openWishlistModal("add", null);
          });
        }

        if (editBtn) {
          editBtn.addEventListener("click", function () {
            if (!nplSelectedRow) {
              alert("먼저 검색리스트에서 관심물건을 선택하세요.");
              return;
            }
            openWishlistModal("edit", nplSelectedRow);
          });
        }

        if (closeBtn) {
          closeBtn.addEventListener("click", function () {
            closeWishlistModal();
          });
        }

        if (saveBtn) {
          saveBtn.addEventListener("click", function () {
            handleWishlistSave();
          });
        }

        if (deleteBtn) {
          deleteBtn.addEventListener("click", function () {
            handleWishlistDelete();
          });
        }

        if (dim) {
          dim.addEventListener("click", function () {
            closeWishlistModal();
          });
        }
        bindWishlistAddressSearchEvent();
      }

  </script>
  <!-- =========================
    [추가] 관심물건 추가/편집 팝업
  ========================= -->
  <div id="wishlist-modal-dim" class="wishlist-modal-dim"></div>

  <div id="wishlist-modal" class="wishlist-modal">
    <div id="wishlist-modal-drag-handle" class="wishlist-modal-header">
      <div id="wishlist-modal-title" class="wishlist-modal-title">관심물건추가</div>

      <div class="wishlist-modal-actions">
        <button id="wishlist-save-btn" type="button" class="wishlist-modal-btn wishlist-save-btn">저장</button>
        <button id="wishlist-delete-btn" type="button" class="wishlist-modal-btn wishlist-delete-btn hidden">삭제</button>
        <button id="wishlist-close-btn" type="button" class="wishlist-modal-btn wishlist-close-btn">닫기</button>
      </div>
    </div>

    <div class="wishlist-modal-body">
      <div class="wishlist-section">
        <div class="wishlist-section-title">주소검색</div>

        <div class="wishlist-row-block has-search-btn">
          <div class="wishlist-row-label">주소입력</div>

          <div class="wishlist-row-control wishlist-address-combined-control">

              id="wishlist-address-search"
              class="wishlist-field-address-main"
              type="text"
              placeholder="예: 경기도 김포시 운양동"
            />

            <input
              id="wishlist-jibun-address"
              class="wishlist-field-address-jibun"
              type="text"
              placeholder="예: 123-4"
            />
          </div>

          <button id="wishlist-address-search-btn" type="button" class="wishlist-modal-btn wishlist-save-btn">검색</button>

        <div class="wishlist-row-block">
          <div class="wishlist-row-label">상세입력</div>
          <div class="wishlist-row-control">
            <input
              id="wishlist-address-detail"
              class="wishlist-field-address-detail"
              type="text"
              placeholder="예: 101동 1203호 / 근린상가 1층"

          주소 키워드 입력 이벤트를 차후 연결할 수 있도록 기본 구조만 구성됨
        </div>
      </div>

      <div class="wishlist-section">
        <div class="wishlist-section-title">공통내용</div>

        <div class="wishlist-inline-list">
          <div class="wishlist-row-block">
            <div class="wishlist-row-label">물건구분</div>
            <div class="wishlist-row-inline">
              <select id="wishlist-category" class="wishlist-field-select-main">
                <option value="아파트">아파트</option>

                <option value="빌라">빌라</option>
                <option value="다가구">다가구</option>

              <select id="wishlist-sub-category" class="wishlist-field-select-sub">

          </div>

          <div class="wishlist-row-block">
            <div class="wishlist-row-label">층</div>
            <div class="wishlist-row-inline">
              <input id="wishlist-floor" class="wishlist-field-compact" type="text" placeholder="층" />
            </div>
          </div>

          <div class="wishlist-row-block">
            <div class="wishlist-row-label">평</div>
            <div class="wishlist-row-inline">
              <input id="wishlist-building-py" class="wishlist-field-compact" type="text" placeholder="평" />
              <span id="wishlist-building-m2-view" class="wishlist-calculated-area" data-value="">면적 자동계산</span>
            </div>
          </div>

          <div class="wishlist-row-block">
            <div class="wishlist-row-label">사건번호</div>
            <div class="wishlist-row-inline">
              <input id="wishlist-case-number" class="wishlist-field-compact" type="text" placeholder="사건번호" />
              <input id="wishlist-auction-applicant" class="wishlist-field-compact" type="text" placeholder="채권은행" />
              <select id="wishlist-auction-method" class="wishlist-field-compact">
                <option value="임의경매">임의경매</option>
                <option value="강제경매">강제경매</option>
              </select>
            </div>
          </div>

          <div class="wishlist-row-block">
            <div class="wishlist-row-label">감정가</div>
            <div class="wishlist-row-inline">
              <input id="wishlist-appraisal-price" class="wishlist-field-money" inputmode="numeric" type="text" placeholder="숫자만 입력" />

          <div class="wishlist-row-block">
            <div class="wishlist-row-label">채권최고액</div>
            <div class="wishlist-row-inline">

          <div class="wishlist-row-block">
            <div class="wishlist-row-label">채권청구액</div>
            <div class="wishlist-row-inline">
              <input id="wishlist-bond-claim-amount" class="wishlist-field-money" inputmode="numeric" type="text" placeholder="숫자만 입력" />
            </div>
          </div>

        </div>
      </div>

      <div class="wishlist-section">
        <div class="wishlist-section-title">기타</div>

        <div class="wishlist-grid-1">
          <div class="wishlist-form-group">
            <label for="wishlist-note">비고</label>
            <textarea id="wishlist-note" placeholder="추가 메모"></textarea>
