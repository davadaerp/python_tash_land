    // - 한 건물/같은 위치 업소가 여러 개인 경우 1개 마커로 통합
    // - 소수점 5자리 반올림 기준(약 1m 단위 수준)
    // =========================
    function groupCommercialItemsByCoordinate(items) {
      const groupedMap = {};

      (items || []).forEach(item => {
        const lat = parseFloat(item.lat || item.latitude || 0);
        const lng = parseFloat(item.lon || item.longitude || 0);

        if (!lat || !lng) return;

        const key = `${lat.toFixed(5)}_${lng.toFixed(5)}`;

        if (!groupedMap[key]) {
          groupedMap[key] = {
            lat,
            lng,
            items: []
          };
        }

        groupedMap[key].items.push(item);
      });

      return Object.values(groupedMap);
    }

    // =========================
    // [추가] 업종 POI 표시 후 지도 배율 보정
    // - 너무 크게 확대되지 않게 최대 줌 제한
    // - 단일 위치일 때도 과확대 방지
    // =========================
    function fitCommercialPoiBounds(poiBounds, groupedLocations = []) {
      if (!poiBounds) return;

      const validGroups = (groupedLocations || []).filter(g => g && g.lat && g.lng);

      if (!validGroups.length) return;

      // 한 지점만 있을 때는 너무 크게 확대되지 않게 고정 줌 사용
      if (validGroups.length === 1) {
        const single = validGroups[0];
        map.setCenter(new naver.maps.LatLng(single.lat, single.lng));
        map.setZoom(15);
        return;
      }

      map.fitBounds(poiBounds);

      // fitBounds 이후 과도 확대 방지
      naver.maps.Event.once(map, 'idle', function() {
        const currentZoom = map.getZoom();
        if (currentZoom > 15) {
          map.setZoom(15);
        }
      });
    }

    // =========================
    // [추가] 네이버 지도에서 해당 좌표로 이동
    // - 좌표 없으면 안내 메시지
    // =========================
    function openNaverMapAtLocation(lat, lng, title = '') {
      const latNum = parseFloat(lat || 0);
      const lngNum = parseFloat(lng || 0);

      if (!latNum || !lngNum) {
        alert("해당 업소의 좌표 정보가 없어 네이버지도로 이동할 수 없습니다.");
        return;
      }

      const placeName = String(title || '').trim();

      // 네이버 지도 웹 URL
      // map?lng=...&lat=...&level=16 + marker
      const url = new URL("https://map.naver.com/v5/");
      url.searchParams.set("c", `${lngNum},${latNum},16,0,0,0,dh`);

      // place name이 있으면 query도 같이 붙여줌
      if (placeName) {
        url.searchParams.set("query", placeName);
      }

      window.open(url.toString(), "_blank");
    }

    // =========================
    // [수정] 선택 업종 지도 표시 (네이버 지도 방식)
    // - 마커 크기 기존의 약 1/3 수준으로 축소
    // - hover 시 업체명 툴팁(InfoWindow) 표시
    // =========================
    function renderCommercialPoiByGroup(groupName, options = {}) {
      clearCommercialPoiMarkers();

      const filteredItems = (commercialAreaItems || []).filter(item => {
        return (item.indsLclsNm || "").trim() === (groupName || "").trim();
      });

      if (!filteredItems.length) {
        alert("해당 업종 위치 데이터가 없습니다.");
        return;
      }

      currentCommercialPoiGroup = groupName;
      buildCommercialNearbyList();
      updateCommercialSelectedGroupBadge(groupName);

      const groupedLocations = groupCommercialItemsByCoordinate(filteredItems);

      const locationCounts = groupedLocations
        .map(group => Array.isArray(group.items) ? group.items.length : 0)
        .filter(count => count > 0);

      const uniqueSortedCounts = [...new Set(locationCounts)].sort((a, b) => b - a);

      const firstRankCount = uniqueSortedCounts[0] || 0;
      const secondRankCount = uniqueSortedCounts[1] || 0;

      if (!groupedLocations.length) {
        alert("표시 가능한 좌표 데이터가 없습니다.");
        return;
      }

      const poiBounds = new naver.maps.LatLngBounds();
      const color = getCommercialGroupColor(groupName);
      const iconText = getCommercialGroupIcon(groupName);

      // 기존보다 10% 더 크게
      // 이전 14px 기준이면 -> 약 15~16px
      const markerSize = 24;   // 16 → 24 (1.5배)
      const markerAnchor = 12;

      groupedLocations.forEach(group => {
        const lat = group.lat;
        const lng = group.lng;
        const itemsAtLocation = group.items || [];

        if (!lat || !lng || !itemsAtLocation.length) return;

        const pos = new naver.maps.LatLng(lat, lng);

        // 대표 타이틀
        const primaryItem = itemsAtLocation[0];
        const title = itemsAtLocation.length === 1
          ? (primaryItem.bizesNm || primaryItem.brchNm || primaryItem.indsMclsNm || groupName)
          : `${primaryItem.bizesNm || primaryItem.indsMclsNm || groupName} 외 ${itemsAtLocation.length - 1}건`;

        const itemCount = itemsAtLocation.length;
        const isRank1 = itemCount === firstRankCount && firstRankCount > 0;
        const isRank2 = itemCount === secondRankCount && secondRankCount > 0;

        const rankClass = isRank1
          ? 'commercial-poi-marker-rank1'
          : (isRank2 ? 'commercial-poi-marker-rank2' : '');

        const rankLabelHtml = isRank1
          ? `<span class="commercial-poi-rank-label rank1">1등 업소</span>`
          : (isRank2 ? `<span class="commercial-poi-rank-label rank2">2등 업소</span>` : '');

        const currentMarkerSize = isRank1 ? 32 : (isRank2 ? 29 : markerSize);
        const currentMarkerAnchor = isRank1 ? 16 : (isRank2 ? 14.5 : markerAnchor);

        const marker = new naver.maps.Marker({
          position: pos,
          map: map,
          zIndex: isRank1 ? 220 : (isRank2 ? 210 : 100),
          icon: {
            content: `
              <div class="${rankClass}" style="
                position:relative;
                width:${currentMarkerSize}px;
                height:${currentMarkerSize}px;
                display:flex;
                align-items:center;
                justify-content:center;
                user-select:none;
                cursor:pointer;
              " title="${title}">

                ${rankLabelHtml}

                <div class="commercial-poi-core" style="
                  position:relative;
                  width:${currentMarkerSize}px;
                  height:${currentMarkerSize}px;
                  border-radius:50%;
                  display:flex;
                  align-items:center;
                  justify-content:center;
                  color:#fff;
                  font-size:${isRank1 ? 14 : (isRank2 ? 13 : 12)}px;
                  font-weight:800;
                  background:${color};
                  box-shadow:0 2px 8px rgba(0,0,0,0.35);
                  border:2px solid rgba(255,255,255,0.95);
                ">
                  <span style="pointer-events:none;">
                    ${iconText}
                  </span>
                </div>

                <span class="commercial-poi-badge" style="
                  position:absolute;
                  top:-6px;
                  right:-6px;
                  min-width:${isRank1 ? 20 : (isRank2 ? 18 : 16)}px;
                  height:${isRank1 ? 20 : (isRank2 ? 18 : 16)}px;
                  padding:0 5px;
                  border-radius:10px;
                  background:#111827;
                  color:#fff;
                  font-size:${isRank1 ? 11 : (isRank2 ? 10.5 : 10)}px;
                  font-weight:800;
                  display:flex;
                  align-items:center;
                  justify-content:center;
                  box-shadow:0 2px 6px rgba(0,0,0,0.3);
                ">
                  ${itemCount}
                </span>
              </div>
            `,
            anchor: new naver.maps.Point(currentMarkerAnchor, currentMarkerAnchor)
          }
        });

        commercialPoiMarkers.push(marker);
        poiBounds.extend(pos);

        // hover 시 업체명/건수 툴팁
        const hoverText = itemsAtLocation.length === 1
          ? (itemsAtLocation[0].bizesNm || itemsAtLocation[0].brchNm || itemsAtLocation[0].indsMclsNm || "업소")
          : `${itemsAtLocation[0].bizesNm || itemsAtLocation[0].indsMclsNm || "업소"} 외 ${itemsAtLocation.length}개`;

        const infoWindow = new naver.maps.InfoWindow({
          content: `
            <div class="commercial-marker-tooltip" style="margin-bottom:6px;">
              ${hoverText}
            </div>
          `,
          borderWidth: 0,
          backgroundColor: "transparent",
          disableAnchor: true,
          pixelOffset: new naver.maps.Point(0, -12)
        });

        marker.__commercialInfoWindow = infoWindow;

        naver.maps.Event.addListener(marker, "mouseover", function() {
          if (commercialPoiTooltipOverlay && commercialPoiTooltipOverlay !== infoWindow) {
            commercialPoiTooltipOverlay.close();
          }
          commercialPoiTooltipOverlay = infoWindow;
          infoWindow.open(map, marker);
        });

        naver.maps.Event.addListener(marker, "mouseout", function() {
          infoWindow.close();
          if (commercialPoiTooltipOverlay === infoWindow) {
            commercialPoiTooltipOverlay = null;
          }
        });

        // 클릭 시 같은 건물/같은 위치 업체 리스트 표시
        naver.maps.Event.addListener(marker, "click", function() {
          if (currentOverlay && typeof currentOverlay.setMap === "function") {
            currentOverlay.setMap(null);
            currentOverlay = null;
          }

          const listHtml = itemsAtLocation.map((item, idx) => {
            const name = item.bizesNm || "-";
            const branch = item.brchNm ? ` (${item.brchNm})` : "";
            const mcls = item.indsMclsNm || "";
            const scls = item.indsSclsNm || "";
            const addr = item.rdnmAdr || item.lnoAdr || "";

            return `
              <div style="
                padding:8px 10px;
                border-bottom:${idx === itemsAtLocation.length - 1 ? "none" : "1px solid #e5e7eb"};
              ">
                <div style="font-weight:700; color:#111827; margin-bottom:2px;">
                  ${name}${branch}
                </div>
                <div style="font-size:12px; color:#2563eb; margin-bottom:2px;">
                  ${mcls}${scls ? " / " + scls : ""}
                </div>
                <div style="font-size:12px; color:#6b7280;">
                  ${addr}
                </div>
              </div>
            `;
          }).join("");

          const popupHtml = `
            <div style="
              min-width:240px;
              max-width:320px;
              max-height:260px;
              overflow-y:auto;
              background:#fff;
              border:1px solid #dbeafe;
              border-radius:14px;
              box-shadow:0 8px 22px rgba(15,23,42,0.18);
            ">
               <div style="
                padding:10px 12px;
                border-bottom:1px solid #e5e7eb;
                background:linear-gradient(180deg,#eff6ff 0%,#ffffff 100%);
                display:flex;
                align-items:center;
                justify-content:space-between;
                gap:10px;
              ">
                <div style="
                  flex:1 1 auto;
                  min-width:0;
                  font-weight:800;
                  color:#1e3a8a;
                  overflow:hidden;
                  text-overflow:ellipsis;
                  white-space:nowrap;
                ">
                  ${groupName} 업소(${itemsAtLocation.length})
                </div>

                <div style="
                  flex:0 0 auto;
                  margin-left:auto;
                  display:flex;
                  align-items:center;
                  justify-content:flex-end;
                ">
                  <button type="button"
                          class="commercial-naver-move-btn"
                          data-lat="${lat}"
                          data-lng="${lng}"
                          data-title="${(title || '').replace(/"/g, '&quot;')}"
                          style="
                            height:28px;
                            padding:0 10px;
                            border:none;
                            border-radius:999px;
                            background:#03c75a;
                            color:#fff;
                            font-size:12px;
                            font-weight:800;
                            cursor:pointer;
                            box-shadow:0 2px 8px rgba(3,199,90,0.22);
                            white-space:nowrap;
                          ">
                    네이버이동
                  </button>
                </div>
              </div>
              ${listHtml}
            </div>
          `;

          currentOverlay = new naver.maps.InfoWindow({
            content: popupHtml,
            borderWidth: 0,
            backgroundColor: "transparent",
            disableAnchor: false,
            pixelOffset: new naver.maps.Point(0, -8)
          });

          currentOverlay.open(map, marker);

          // 팝업 내 네이버 이동 버튼 이벤트 바인딩
          setTimeout(() => {
              const naverMoveBtn = document.querySelector('.commercial-naver-move-btn');
              if (!naverMoveBtn) return;

              naverMoveBtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();

                const moveLat = this.getAttribute('data-lat') || '';
                const moveLng = this.getAttribute('data-lng') || '';
                const moveTitle = this.getAttribute('data-title') || '';

                openNaverMapAtLocation(moveLat, moveLng, moveTitle);
              };
            }, 0);
        });
      });

      // [추가] 업종 POI 기준으로 지도 배율 보정
      fitCommercialPoiBounds(poiBounds, groupedLocations);

      if (!poiBounds.isEmpty()) {
        map.fitBounds(poiBounds, {
          top: 40,
          right: 40,
          bottom: 40,
          left: 40
        });
      }
    }

    // =========================
    // [추가] 거리재기 유틸
    // =========================
    function calcMeasureDistanceMeters(from, to) {
      if (!from || !to) return 0;

      const lat1 = typeof from.y === 'function' ? from.y() : from.lat();
      const lng1 = typeof from.x === 'function' ? from.x() : from.lng();
      const lat2 = typeof to.y === 'function' ? to.y() : to.lat();
      const lng2 = typeof to.x === 'function' ? to.x() : to.lng();

      const R = 6371000; // meters
      const toRad = deg => deg * Math.PI / 180;

      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function applyMeasureCursor(active) {
      const mapEl = document.getElementById('map');
      if (!mapEl) return;

      const styleId = 'measure-cursor-style';
      let styleEl = document.getElementById(styleId);

      if (active) {
        const pencilCursor = `url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'>\
  <g transform='rotate(-20 16 16)'>\
    <rect x='11' y='4' width='10' height='17' rx='2' fill='%23f59e0b'/>\
    <rect x='11' y='19' width='10' height='4' fill='%23fbbf24'/>\
    <polygon points='11,23 21,23 16,29' fill='%23374151'/>\
    <rect x='11' y='2' width='10' height='3' rx='1' fill='%23ef4444'/>\
    <rect x='12.5' y='6' width='1.4' height='13' fill='%23fde68a' opacity='0.9'/>\
    <rect x='15.3' y='6' width='1.4' height='13' fill='%23fde68a' opacity='0.9'/>\
    <rect x='18.1' y='6' width='1.4' height='13' fill='%23fde68a' opacity='0.9'/>\
  </g>\
</svg>") 6 26, crosshair`;

        if (!styleEl) {
          styleEl = document.createElement('style');
          styleEl.id = styleId;
          document.head.appendChild(styleEl);
        }

        styleEl.textContent = `
          #map, #map * {
            cursor: ${pencilCursor} !important;
          }
        `;

        try {
          map.setOptions({
            draggableCursor: pencilCursor
          });
        } catch (err) {}
      } else {
        if (styleEl) styleEl.remove();

        try {
          map.setOptions({
            draggableCursor: 'grab'
          });
        } catch (err) {}

        mapEl.style.cursor = '';
      }
    }

    function formatMeasureDistance(meters) {
      if (!isFinite(meters)) return '0m';
      if (meters >= 1000) return (meters / 1000).toFixed(2) + 'km';
      return Math.round(meters) + 'm';
    }

    function formatMeasureDuration(minutes) {
      if (!isFinite(minutes) || minutes <= 0) return '0분';
      if (minutes < 60) return `${Math.round(minutes)}분`;

      const h = Math.floor(minutes / 60);
      const m = Math.round(minutes % 60);
      return m > 0 ? `${h}시간 ${m}분` : `${h}시간`;
    }

    function showMeasureResultOverlay() {
      if (measurePoints.length < 2) return;

      if (measureTotalOverlay) {
        measureTotalOverlay.setMap(null);
        measureTotalOverlay = null;
      }

      const totalDist = getMeasureTotalDistance();
      const lastPos = measurePoints[measurePoints.length - 1];

      // 대략치
      const walkMinutes = totalDist / 67;   // 약 4km/h
      const bikeMinutes = totalDist / 200;  // 약 12km/h

      // 끝점에 고정 카드 표시
      measureTotalOverlay = new naver.maps.Marker({
        position: lastPos,
        map: map,
        zIndex: 1000,
        icon: {
          content: `
            <div class="measure-result-card" style="pointer-events:auto;">
              <button type="button" class="measure-result-close" title="닫기" onclick="closeMeasureResultOverlay(event)">×</button>
              <div class="title">거리재기 결과</div>
              <div class="total">${formatMeasureDistance(totalDist)}</div>
              <div class="meta">
                도보 약 ${formatMeasureDuration(walkMinutes)}<br>
                자전거 약 ${formatMeasureDuration(bikeMinutes)}
              </div>
            </div>
          `,
          // 카드의 꼬리 부분이 실제 마지막 점에 오도록 anchor 조정
          anchor: new naver.maps.Point(20, 78)
        }
      });
    }

    function closeMeasureResultOverlay(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      if (measureTotalOverlay) {
        measureTotalOverlay.setMap(null);
        measureTotalOverlay = null;
      }
    }

    function showMeasureClearButton() {
      const clearBtn = document.getElementById('measure-clear-btn');
      if (clearBtn) {
        clearBtn.style.display = (measurePoints.length > 0 || measureLine || measureTempLine) ? 'inline-flex' : 'none';
      }
    }

    function clearMeasureGuideOverlay() {
      if (measureGuideOverlay) {
        measureGuideOverlay.setMap(null);
        measureGuideOverlay = null;
      }
    }

    function clearMeasureOverlays() {
      measureSegmentOverlays.forEach(ov => ov.setMap(null));
      measureSegmentOverlays = [];

      if (measureTotalOverlay) {
        measureTotalOverlay.setMap(null);
        measureTotalOverlay = null;
      }

      clearMeasureGuideOverlay();
    }

    function clearMeasurePointMarkers() {
      measurePointMarkers.forEach(marker => marker.setMap(null));
      measurePointMarkers = [];
    }

    function clearMeasureLines() {
      if (measureLine) {
        measureLine.setMap(null);
        measureLine = null;
      }
      if (measureTempLine) {
        measureTempLine.setMap(null);
        measureTempLine = null;
      }
    }

    function clearMeasureAll() {
      clearMeasureLines();
      clearMeasureOverlays();
      clearMeasurePointMarkers();
      measurePoints = [];
      showMeasureClearButton();
    }

    function getMeasureTotalDistance() {
      if (measurePoints.length < 2) return 0;

      let meters = 0;
      for (let i = 1; i < measurePoints.length; i++) {
        meters += calcMeasureDistanceMeters(measurePoints[i - 1], measurePoints[i]);
      }
      return meters;
    }

    function createMeasureLabel(content, position, className) {
      return new naver.maps.Marker({
        position: position,
        map: map,
        clickable: false,
        icon: {
          content: `<div class="${className}" style="pointer-events:none;">${content}</div>`,
          anchor: new naver.maps.Point(0, 0)
        }
      });
    }

    // =========================
    // [추가] 거리재기 선/점/구간거리 표시
    function redrawMeasureLine() {
      clearMeasureLines();
      clearMeasureOverlays();
      clearMeasurePointMarkers();

      // 1) 점(시작/중간/끝) 표시
      measurePoints.forEach((point, idx) => {
        const isStart = idx === 0;
        const isEnd = idx === measurePoints.length - 1;

        let bgColor = '#ffffff';
        let borderColor = '#ef4444';
        let size = 10;

        if (isStart) {
          bgColor = '#ef4444';
          borderColor = '#ffffff';
          size = 12;
        } else if (isEnd) {
          bgColor = '#111827';
          borderColor = '#ffffff';
          size = 12;
        }

        const pointMarker = new naver.maps.Marker({
          position: point,
          map: map,
          clickable: false,
          icon: {
            content: `
              <div style="
                width:${size}px;
                height:${size}px;
                border-radius:50%;
                background:${bgColor};
                border:2px solid ${borderColor};
                box-shadow:0 2px 8px rgba(0,0,0,0.25);
                pointer-events:none;
              "></div>
            `,
            anchor: new naver.maps.Point(size / 2, size / 2)
          }
        });

        measurePointMarkers.push(pointMarker);

        if (idx === 0) {
          const startLabel = new naver.maps.Marker({
            position: point,
            map: map,
            clickable: false,
            icon: {
            content: `
              <div class="measure-distance-label" style="transform:translate(18px,-34px); background:#334155; pointer-events:none;">
                출발
              </div>
            `,
              anchor: new naver.maps.Point(0, 0)
            }
          });
          measureSegmentOverlays.push(startLabel);
        }
      });

      // 2) 선 표시
      if (measurePoints.length >= 2) {
        measureLine = new naver.maps.Polyline({
          map: map,
          path: measurePoints,
          strokeColor: '#ef4444',
          strokeOpacity: 0.95,
          strokeWeight: 4,
          strokeLineCap: 'round',
          strokeLineJoin: 'round',
          strokeStyle: 'solid'
        });

        // 3) 각 끝점(새로 찍힌 점) 위에 구간 거리 표시
        for (let i = 1; i < measurePoints.length; i++) {
          const from = measurePoints[i - 1];
          const to = measurePoints[i];
          const segDist = calcMeasureDistanceMeters(from, to);

          const segOverlay = new naver.maps.Marker({
            position: to,
            map: map,
            clickable: false,
            icon: {
              content: `
                <div class="measure-distance-label" style="transform:translate(18px,-34px); pointer-events:none;">
                  ${formatMeasureDistance(segDist)}
                </div>
              `,
              anchor: new naver.maps.Point(0, 0)
            }
          });

          measureSegmentOverlays.push(segOverlay);
        }
      }

      showMeasureClearButton();
    }


    function updateMeasureTempLine(mouseLatLng) {
      if (!isMeasureMode || measurePoints.length === 0) return;

      if (measureTempLine) {
        measureTempLine.setMap(null);
        measureTempLine = null;
      }

      const lastPoint = measurePoints[measurePoints.length - 1];
      measureTempLine = new naver.maps.Polyline({
        map: map,
        path: [lastPoint, mouseLatLng],
        strokeColor: '#f87171',
        strokeOpacity: 0.85,
        strokeWeight: 3,
        strokeLineCap: 'round',
        strokeLineJoin: 'round',
        strokeStyle: 'shortdash',
        clickable: false
      });

      const tempDist = calcMeasureDistanceMeters(lastPoint, mouseLatLng);
      clearMeasureGuideOverlay();

      measureGuideOverlay = new naver.maps.Marker({
        position: mouseLatLng,
        map: map,
        clickable: false,
        zIndex: 1,
        icon: {
          content: `
            <div class="measure-guide-overlay"
                 style="transform:translate(22px,-52px); pointer-events:none;">
              ${formatMeasureDistance(tempDist)}<br>
              클릭: 계속 / 우클릭: 종료
            </div>
          `,
          anchor: new naver.maps.Point(0, 0)
        }
      });
    }

    function setMeasureMode(active) {
      isMeasureMode = active;

      const btn = document.getElementById('measure-distance-btn');
      if (btn) {
        btn.classList.toggle('active', active);
        btn.innerHTML = active ? '📏 동선재기 중' : '📏 동선재기';
      }

      // =========================
      // [수정] 실제 지도 DOM 커서 변경
      // =========================
      applyMeasureCursor(active);

      if (!active) {
        if (measureTempLine) {
          measureTempLine.setMap(null);
          measureTempLine = null;
        }
        clearMeasureGuideOverlay();
      }
    }

    // =========================
    // [추가] LEFT 패널 슬라이드 토글 함수
    // =========================
    function applyNplLeftPanelSlideSettings() {
      const layoutEl = document.getElementById('npl-layout');
      if (!layoutEl) return;

      layoutEl.style.setProperty('--npl-left-panel-width', `${NPL_LEFT_PANEL_SLIDE_SETTINGS.expandedWidth}px`);
      layoutEl.style.setProperty('--npl-left-panel-collapsed-width', `${NPL_LEFT_PANEL_SLIDE_SETTINGS.collapsedWidth}px`);

    function bindMeasureTool() {
      const measureBtn = document.getElementById('measure-distance-btn');
      const clearBtn = document.getElementById('measure-clear-btn');

      if (!measureBtn || !clearBtn) return;

      const mapEl = document.getElementById('map');
      if (mapEl) {

        });
      }

      // 결과 카드 닫기
      document.addEventListener('click', function(e) {
        const closeBtn = e.target.closest('.measure-result-close');
        if (!closeBtn) return;

        e.preventDefault();
        e.stopPropagation();

        if (measureTotalOverlay) {
          measureTotalOverlay.setMap(null);
          measureTotalOverlay = null;
        }
      });

      naver.maps.Event.addListener(map, 'click', function(e) {
        if (!isMeasureMode) return;

        // 새로 이어그리기 시작하면 이전 최종 결과 카드는 제거
        if (measureTotalOverlay) {
          measureTotalOverlay.setMap(null);
          measureTotalOverlay = null;
        }

        const clickLatLng = e.coord;
        measurePoints.push(clickLatLng);
        redrawMeasureLine();
      });

      naver.maps.Event.addListener(map, 'mousemove', function(e) {
        if (!isMeasureMode) return;
        if (measurePoints.length === 0) return;
        updateMeasureTempLine(e.coord);
      });

      naver.maps.Event.addListener(map, 'rightclick', function(e) {
        if (!isMeasureMode) return;

        if (e && e.domEvent && typeof e.domEvent.preventDefault === 'function') {
          e.domEvent.preventDefault();
        }

        if (measureTempLine) {
          measureTempLine.setMap(null);
          measureTempLine = null;
        }

        setMeasureMode(false);

        if (measurePoints.length >= 2) {
          showMeasureResultOverlay();
        }
      });

    function parseNumberWithCommas(value) {
      if (value == null) return 0;
      return Number(String(value).replace(/,/g, "").trim()) || 0;
    }

    function formatNumber(value) {
      const num = Number(value || 0);
      return num.toLocaleString("ko-KR");
    }

    function calcExecutionAmount(claimAmount, annualRate = 0.05, months = 3) {
      const base = parseNumberWithCommas(claimAmount);
      if (!base) return 0;

      const interest = base * annualRate * (months / 12);
      return Math.round(base + interest);
    }

    function calcExecutionAmountAdvanced({
      maxClaimAmount,
      discountRate = 0.1,
      annualRate = 0.1,
      months = 12
    }) {
      // 1. 채권최고액 숫자 변환
      const base = parseNumberWithCommas(maxClaimAmount);

      // 기준금액 없으면 0
      if (!base) return 0;

      // 2. 할인율 보정
      // 음수 방지, 100% 초과 방지
      const safeDiscountRate = Math.min(Math.max(Number(discountRate) || 0, 0), 1);

      // 3. 이자율 보정
      // 음수 방지
      const safeAnnualRate = Math.max(Number(annualRate) || 0, 0);

      // 4. 개월 수 보정
      // 음수 방지
      const safeMonths = Math.max(Number(months) || 0, 0);

      // 5. 할인 적용 원금
      const discountedPrincipal = base * (1 - safeDiscountRate);

      // 6. 연 단위 환산
      const yearFraction = safeMonths / 12;

      // 7. 단리 이자 계산
      const interestAmount = discountedPrincipal * safeAnnualRate * yearFraction;

      // 8. 최종 행사원리금
      const total = discountedPrincipal + interestAmount;

      return Math.round(total);
    }


    function convertToKoreanAmount(value) {
      const num = Number(value || 0);
      if (!num) return "0";

      const eok = Math.floor(num / 10000);
      const man = Math.floor(num % 10000);

      if (eok > 0 && man > 0) return `${eok}억 ${man.toLocaleString("ko-KR")}만`;
      if (eok > 0) return `${eok}억`;
      return `${man.toLocaleString("ko-KR")}만`;
    }

    function convertToKoreanAmountShort(value) {
      const num = Number(value || 0);
      if (!num) return "0";

      const eok = Math.floor(num / 10000);
      const man = Math.floor(num % 10000);

      if (eok > 0) {
        const cheon = Math.floor(man / 1000);
        const baek = Math.floor((man % 1000) / 100);

        let tail = "";
        if (cheon > 0) tail += `${cheon}천`;
        if (baek > 0) tail += `${baek}백`;

        return tail ? `${eok}억${tail}` : `${eok}억`;
      }

      const cheon = Math.floor(man / 1000);
      const baek = Math.floor((man % 1000) / 100);

      let result = "";
      if (cheon > 0) result += `${cheon}천`;
      if (baek > 0) result += `${baek}백`;

      return result || `${man.toLocaleString("ko-KR")}만`;
    }

    // 백 단위는 무시하고 천 단위까지만 표기하는 버전
    function convertToKoreanAmountShortNoBaek(value) {
      const num = Number(value || 0);
      if (!num) return "0";

      const eok = Math.floor(num / 10000);
      const man = Math.floor(num % 10000);

      if (eok > 0) {
        const cheon = Math.floor(man / 1000);
        return cheon > 0 ? `${eok}억${cheon}천` : `${eok}억`;
      }

      const cheon = Math.floor(man / 1000);
      const baek = Math.floor((man % 1000) / 100);

      if (cheon > 0 && baek > 0) return `${cheon}천${baek}백`;
      if (cheon > 0) return `${cheon}천`;
      if (baek > 0) return `${baek}백`;

      return `${man.toLocaleString("ko-KR")}만`;
    }

    function calculateEvaluationDate(startDecisionDateStr) {
      if (!startDecisionDateStr) {
        return {
          diffDays: 0,
          evaluationDaysFromToday: 90,
          evaluationDate: new Date()
        };
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const [yyyy, mm, dd] = String(startDecisionDateStr).split("-");
      const startDate = new Date(
        parseInt(yyyy, 10),
        parseInt(mm, 10) - 1,
        parseInt(dd, 10)
      );
      startDate.setHours(0, 0, 0, 0);

      const msPerDay = 24 * 60 * 60 * 1000;
      const diffMs = today.getTime() - startDate.getTime();
      const diffDays = Math.ceil(diffMs / msPerDay);
      const evaluationDaysFromToday = diffDays + 90;
      const evaluationDate = new Date(today.getTime() + evaluationDaysFromToday * msPerDay);

      return {
        diffDays,
        evaluationDaysFromToday,
        evaluationDate
      };
    }

    function buildNplEvalAmount(item) {
      const bondClaimAmount = parseNumberWithCommas(item.bond_claim_amount);
      const bondSrcAmount = parseNumberWithCommas(item.bond_max_amount) / 1.2;
      const { evaluationDaysFromToday } = calculateEvaluationDate(item.start_decision_date);
      const delayDay = Number(evaluationDaysFromToday) / 365;
      const bondEvalAmount = Number(bondClaimAmount) + (Number(bondSrcAmount) * 0.097 * delayDay);

      item.bond_src_amount = Math.round(bondSrcAmount);
      item.bond_eval_amount = Math.round(bondEvalAmount);
      item.bond_eval_day = evaluationDaysFromToday;

      return item.bond_eval_amount;

    function getNplFloorSortValue(item) {
      const floorText = getNplFloorText(item);
      if (!floorText || floorText === "-") return -9999;

      const text = String(floorText).trim();

      // 반지하/지하 우선 처리
      if (text.includes("반지하")) return -0.5;

      const basementMatch = text.match(/지하\s*(\d+)/);
      if (basementMatch) return -Number(basementMatch[1]);

      const numMatch = text.match(/-?\d+(?:\.\d+)?/);
      if (!numMatch) return -9999;

      return Number(numMatch[0]);
    }

    // 국토부 데이터의 실거래 정보 조회 (지도 팝업 내 "실거래" 버튼 클릭 시)
    async function fetchNplRelatedDealData(row) {
      // const lawdCd = "41570";
      // const lawdNm = "경기도 김포시";
      // const umdNm = "운양동";
      // lawdCd는 5자리까지만 사용 (시군구 기준)
      const lawdCd = String(selectedLawdCd || "").substring(0, 5);
      const lawdNm = getNplLawdNmForDeal(row);
      const umdNm = selectedUmdNm;
      const years_count = 3;

      if (!lawdCd || !umdNm) return [];

      let apiPath = "";
      const type = normalizeNplType(row?.category || "");

      if (type === "아파트") {
        apiPath = "/api/apt/land_data";
      } else if (type === "빌라" || type === "다가구") {
        apiPath = "/api/villa/land_data";
      } else {
        apiPath = "/api/sanga/land_data";
      }

      const url = new URL(apiPath, window.location.origin);
      url.searchParams.set("lawd_cd", lawdCd);
      url.searchParams.set("lawd_nm", lawdNm);
      url.searchParams.set("umd_nm", umdNm);
      url.searchParams.set("years_count", years_count);

      console.log("[fetchNplRelatedDealData] 요청 URL =", url.toString());

      const res = await fetch(url.toString(), { method: "GET" });
      if (!res.ok) {
        throw new Error(`실거래 API 호출 실패: ${res.status}`);
      }

      const data = await res.json();
      console.log("[fetchNplRelatedDealData] 원본 응답 data =", data);

      const mappedRows = (Array.isArray(data) ? data : []).map(itemData => {
        itemData.dealDate =
          `${itemData.dealYear}-${String(itemData.dealMonth).padStart(2, "0")}-${String(itemData.dealDay).padStart(2, "0")}`;

        // 면적 필드 우선순위 보정
        const rawAreaSqm =
          itemData.excluUseAr ??
          itemData.buildingAr ??
          itemData.exclusiveArea ??
          itemData.area ??
          "";

        const areaPyeong = rawAreaSqm ? calcPyeong(rawAreaSqm) : "";

        // 거래금액 숫자화
        const tradeAmountNum = parseNumberWithCommas(itemData.dealAmount);

        itemData.convertedDealAmount = tradeAmountNum
          ? convertToKoreanAmount(tradeAmountNum)
          : "-";

        // 필터용
        itemData.cfloor = itemData.floor;
        itemData.exclusive_area_pyeong = areaPyeong;

        const areaNum = parseFloat(String(areaPyeong || "0").replace(/,/g, ""));
        const unitPrice = areaNum > 0 ? tradeAmountNum / areaNum : 0;

        // 위경도 흡수
        const latitude =
          parseFloat(itemData.latitude || itemData.lat || itemData.y || 0) || 0;
        const longitude =
          parseFloat(itemData.longitude || itemData.lon || itemData.x || 0) || 0;

        // 용도/건물명 우선순위
        const useText =
          (itemData.aptNm || "").trim() ||
          (itemData.mhouseNm || "").trim() ||
          (itemData.buildingUse || "").trim() ||
          "-";

        return {
          type: "real",
          raw: itemData,
          date: itemData.dealDate,
          buildYear: itemData.buildYear || "",
          floor: itemData.floor || "",
          area: areaPyeong || "",
          unitPrice: unitPrice ? Math.round(unitPrice) : 0,
          priceText: itemData.convertedDealAmount || "-",
          unitPriceText: unitPrice ? formatNumber(Math.round(unitPrice)) : "-",
          useText: useText,
          buildingName: useText,
          address: [
            row.region || "",
            row.sigungu_name || "",
            itemData.umdNm || row.eub_myeon_dong || "",
            itemData.jibun || ""
          ].join(" ").replace(/\s+/g, " ").trim(),
          latitude: latitude,
          longitude: longitude
        };
      });

      console.log("[실거래 가공 전체]", mappedRows);
      return mappedRows;
    }

    // 국토부 데이터의 경매 정보 조회 (지도 팝업 내 "경매" 버튼 클릭 시)
    async function fetchNplRelatedAuctionData(row) {
        // ✅ [수정] 전역변수가 비어있을 경우 row 파라미터로 fallback
        const lawdCd = String(
          selectedLawdCd ||
          row?.lawd_cd ||
          row?.sigungu_code ||
          initialSelectionState.lawdCd ||
          ""
        ).trim();

        const umdNm = String(
          selectedUmdNm ||
          row?.eub_myeon_dong ||
          initialSelectionState.umdNm ||
          ""
        ).trim();
        const mainCategory = getNplAuctionMainCategory(row);

        if (!lawdCd || !umdNm) {
          console.warn("[fetchNplRelatedAuctionData] lawdCd 또는 umdNm 없음 → 빈 배열 반환", {
            lawdCd, umdNm, selectedLawdCd, selectedUmdNm, row
          });
          return [];
        }

        const url = new URL("/api/auction", window.location.origin);
        url.searchParams.set("lawdCd", lawdCd);
        url.searchParams.set("umdNm", umdNm);
        url.searchParams.set("searchTerm", "");
        url.searchParams.set("yearRange", "3");
        url.searchParams.set("mainCategory", mainCategory);
        url.searchParams.set("dangiName", "");

        console.log("[fetchNplRelatedAuctionData] 요청 URL =", url.toString());

        const res = await fetch(url.toString(), { method: "GET" });
        if (!res.ok) {
          throw new Error(`경매 API 호출 실패: ${res.status}`);
        }
        const data = await res.json();

        console.log("[fetchNplRelatedAuctionData] 응답 데이터 =", data);

        // [수정] address fallback 구성용 기본 지역 텍스트
        // row(baseRow) 에서 region/sigungu_name/eub_myeon_dong 을 조합해 기본 주소 생성
        const baseAddressText = [
          row?.region || "",
          row?.sigungu_name || "",
          row?.eub_myeon_dong || umdNm || ""
        ].filter(Boolean).join(" ").trim();

        const mappedRows = (Array.isArray(data) ? data : []).map(item => {
          const amount = Number(item.sale_price || 0) / 10000;
          const area = parseFloat(item.building_py || 0) || 0;
          const unitPrice = area > 0 ? Math.round(amount / area) : 0;

          const latitude =
            parseFloat(item.latitude || item.lat || item.y || 0) || 0;
          const longitude =
            parseFloat(item.longitude || item.lon || item.lng || item.x || 0) || 0;

          // [수정 핵심] address1 이 없을 때 baseAddressText 로 fallback
          // address1 예: "경기도 김포시 운양동 123-4 (운양동, 테스트빌딩)"
          // baseAddressText 예: "경기도 김포시 운양동"
          // 둘 다 없으면 umdNm(읍면동명)만이라도 사용 → geocodeIfNeeded 에서 geocode 시도 가능
          const addressText = (item.address1 || "").trim()
            || baseAddressText
            || umdNm
            || "";

          const mappedRow = {
              type: "auction",
              raw: item,
              date: item.sales_date || "",
              caseNumber: item.case_number || "",
              floor: item.floor || "",
              area: item.building_py || "",
              unitPrice: unitPrice || 0,
              unitPriceText: item.pydanga_sale || (unitPrice ? formatNumber(unitPrice) : "-"),
              priceText: `${convertToKoreanAmountShortNoBaek(amount)}${item.sale_percent ? `(${item.sale_percent})` : ""}`,
              appraisalText: item.appraisal_price ? convertToKoreanAmount(parseNumberWithCommas(item.appraisal_price) / 10000) : "-",
              minText: item.min_price ? convertToKoreanAmount(parseNumberWithCommas(item.min_price) / 10000) : "-",
              address: addressText,
              buildingName: item.dangi_name || "-",
              latitude: latitude,
              longitude: longitude
          };

          console.log("[경매 가공 row]", mappedRow);
          return mappedRow;
        });

        console.log("[경매 가공 전체]", mappedRows);
        return mappedRows;
    }

    // 지도 초기 로딩 / 초기화 복귀 시

          ">데이터 가져오는중</div>

          <div style="flex:1; min-height:0; display:flex; flex-direction:column;">
            <div id="npl-popup-real-wrap" class="npl-da-section" style="display:none;"></div>
            <div id="npl-popup-auction-wrap" class="npl-da-section" style="display:none;"></div>
          </div>
        </div>
      `;
    }

    // 실거래/경매 데이터가 조회되면, 해당 데이터를 표 형태로 팝업 내에 렌더링
    // 실거래/경매 탭 내에서 추가로 평수/층수/가격 등으로 필터링할 수 있는 UI도 같이 생성
    function nplSafeNum(v) {
      if (v == null) return 0;
      const s = String(v).replace(/[^\d.-]/g, "");
      const n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    }

    function nplDateKey(v) {
      return Number(String(v || "").replace(/[^\d]/g, "")) || 0;
    }

    function nplFloorLabel(v) {
      const s = String(v || "").trim();
      if (!s) return "-";
      return s.includes("층") ? s : `${s}층`;
    }

    function nplFloorSortValue(v) {
      const s = String(v || "").trim().toLowerCase();
      if (!s) return -9999;
      if (s.includes("지하") || s.startsWith("b")) {
        const m = s.match(/-?\d+/);
        return m ? -Math.abs(parseInt(m[0], 10)) : -1;
      }
      const m = s.match(/-?\d+/);
      return m ? parseInt(m[0], 10) : -9999;
    }

    function nplGetFloorNumber(v) {
      const s = String(v || "").trim().toLowerCase();
      if (!s) return null;

      if (s.includes("반지하")) return 0;

      const basementMatch = s.match(/지하\s*(\d+)/);
      if (basementMatch) {
        return -Math.abs(parseInt(basementMatch[1], 10));
      }

      const numMatch = s.match(/-?\d+/);
      if (!numMatch) return null;

      return parseInt(numMatch[0], 10);
    }

    function nplIsLowFloor(v) {
      const floorNo = nplGetFloorNumber(v);
      return floorNo !== null && floorNo >= 1 && floorNo <= 2;
    }

    function nplIsHighFloor(v) {
      const floorNo = nplGetFloorNumber(v);
      return floorNo !== null && floorNo >= 3;
    }

    function nplAreaGroupValue(v) {
      const n = parseFloat(v);
      if (isNaN(n)) return "all";
      return n < 10 ? "9" : String(Math.floor(n / 10) * 10);
    }

    function nplBuildRealAreaText(item) {
      const sqm =
        item.raw?.excluUseAr ||
        item.raw?.buildingAr ||
        item.raw?.exclusiveArea ||
        item.raw?.area ||
        "";

      const py = item.area || "";

      if (!sqm && !py) return "-";

      const sqmText = sqm ? parseFloat(sqm).toFixed(1) : "-";
      const pyText = py ? parseFloat(py).toFixed(1) : "-";

      return `
        <span class="npl-da-area-sqm">${sqmText}</span> /
        <span class="npl-da-area-py">${pyText}</span>
      `;
    }

    function nplFormatAuctionAppraisalMin(item) {
      const appraisalNum = parseNumberWithCommas(item.raw?.appraisal_price) / 10000;
      const minNum = parseNumberWithCommas(item.raw?.min_price) / 10000;
      const appraisal = appraisalNum ? convertToKoreanAmountShortNoBaek(appraisalNum) : "-";
      const min = minNum ? convertToKoreanAmountShortNoBaek(minNum) : "-";
      const minPercent = item.raw?.min_percent || "";

      return `${appraisal}/${min}${minPercent ? ` (${minPercent})` : ""}`;
    }

    function nplBuildRealFilterOptions(rows) {
      const yearSet = new Set();
      const floorSet = new Set();
      const areaSet = new Set();

      let hasLowFloor = false;
      let hasHighFloor = false;

      rows.forEach(item => {
        if (item.buildYear) yearSet.add(String(item.buildYear));
        if (item.floor) {
          floorSet.add(String(item.floor));

          if (nplIsLowFloor(item.floor)) hasLowFloor = true;
          if (nplIsHighFloor(item.floor)) hasHighFloor = true;
        }
        if (item.area) areaSet.add(nplAreaGroupValue(item.area));
      });

      const sortedFloors = Array.from(floorSet).sort((a, b) => nplFloorSortValue(a) - nplFloorSortValue(b));
      const floors = [];

      if (hasLowFloor) floors.push("low");
      if (hasHighFloor) floors.push("high");

      floors.push(...sortedFloors);

      return {
        years: Array.from(yearSet).sort((a, b) => Number(a) - Number(b)),
        floors,
        areas: Array.from(areaSet).filter(v => v !== "all").sort((a, b) => Number(a) - Number(b))
      };
    }

    function nplBuildAuctionFilterOptions(rows) {
      const floorSet = new Set();
      const areaSet = new Set();

      let hasLowFloor = false;
      let hasHighFloor = false;

      rows.forEach(item => {
        if (item.floor) {
          floorSet.add(String(item.floor));

          if (nplIsLowFloor(item.floor)) hasLowFloor = true;
          if (nplIsHighFloor(item.floor)) hasHighFloor = true;
        }
        if (item.area) areaSet.add(nplAreaGroupValue(item.area));
      });

      const sortedFloors = Array.from(floorSet).sort((a, b) => nplFloorSortValue(a) - nplFloorSortValue(b));
      const floors = [];

      if (hasLowFloor) floors.push("low");
      if (hasHighFloor) floors.push("high");

      floors.push(...sortedFloors);

      return {
        floors,
        areas: Array.from(areaSet).filter(v => v !== "all").sort((a, b) => Number(a) - Number(b))
      };
    }

    function nplApplyRealFilters(rows) {
      const yearVal = document.getElementById("npl-real-filter-year")?.value || "all";
      const floorVal = document.getElementById("npl-real-filter-floor")?.value || "all";
      const areaVal = document.getElementById("npl-real-filter-area")?.value || "all";
      const aptNameKeyword = (document.getElementById("npl-real-filter-apt-name")?.value || "").trim().toLowerCase();
      const isApartmentType = isNplApartmentTypeRow(currentNplDealAuctionBaseRow);

      return rows.filter(item => {
        const yearOk = yearVal === "all" ? true : String(item.buildYear || "") === yearVal;

        let floorOk = true;
        if (floorVal === "low") {
          floorOk = nplIsLowFloor(item.floor);
        } else if (floorVal === "high") {
          floorOk = nplIsHighFloor(item.floor);
        } else if (floorVal !== "all") {
          floorOk = String(item.floor || "") === floorVal;
        }

        const areaOk = areaVal === "all" ? true : nplAreaGroupValue(item.area) === areaVal;

        let aptNameOk = true;
        if (isApartmentType && aptNameKeyword) {
          const aptName = String(item.raw?.aptNm || item.useText || "").trim().toLowerCase();
          aptNameOk = aptName.includes(aptNameKeyword);
        }

        return yearOk && floorOk && areaOk && aptNameOk;
      });
    }

    function nplApplyAuctionFilters(rows) {
      const floorVal = document.getElementById("npl-auction-filter-floor")?.value || "all";
      const areaVal = document.getElementById("npl-auction-filter-area")?.value || "all";

      return rows.filter(item => {
        let floorOk = true;
        if (floorVal === "low") {
          floorOk = nplIsLowFloor(item.floor);
        } else if (floorVal === "high") {
          floorOk = nplIsHighFloor(item.floor);
        } else if (floorVal !== "all") {
          floorOk = String(item.floor || "") === floorVal;
        }

        const areaOk = areaVal === "all" ? true : nplAreaGroupValue(item.area) === areaVal;
        return floorOk && areaOk;
      });
    }

    function nplSortRealRows(rows) {
      const copied = [...rows];
      copied.sort((a, b) => {
        if (currentNplDealSort.key === "date") {
          return currentNplDealSort.dir === "asc"
            ? nplDateKey(a.date) - nplDateKey(b.date)
            : nplDateKey(b.date) - nplDateKey(a.date);
        }

        if (currentNplDealSort.key === "buildYear") {
          return currentNplDealSort.dir === "asc"
            ? nplSafeNum(a.buildYear) - nplSafeNum(b.buildYear)
            : nplSafeNum(b.buildYear) - nplSafeNum(a.buildYear);
        }

        if (currentNplDealSort.key === "floor") {
          return currentNplDealSort.dir === "asc"
            ? nplFloorSortValue(a.floor) - nplFloorSortValue(b.floor)
            : nplFloorSortValue(b.floor) - nplFloorSortValue(a.floor);
        }

        if (currentNplDealSort.key === "area") {
          return currentNplDealSort.dir === "asc"
            ? nplSafeNum(a.area) - nplSafeNum(b.area)
            : nplSafeNum(b.area) - nplSafeNum(a.area);
        }

        if (currentNplDealSort.key === "unitPrice") {
          return currentNplDealSort.dir === "asc"
            ? nplSafeNum(a.unitPrice) - nplSafeNum(b.unitPrice)
            : nplSafeNum(b.unitPrice) - nplSafeNum(a.unitPrice);
        }

        return 0;
      });
      return copied;
    }

    function nplSortAuctionRows(rows) {
      const copied = [...rows];
      copied.sort((a, b) => {
        if (currentNplAuctionSort.key === "date") {
          return currentNplAuctionSort.dir === "asc"
            ? nplDateKey(a.date) - nplDateKey(b.date)
            : nplDateKey(b.date) - nplDateKey(a.date);
        }

        if (currentNplAuctionSort.key === "floor") {
          return currentNplAuctionSort.dir === "asc"
            ? nplFloorSortValue(a.floor) - nplFloorSortValue(b.floor)
            : nplFloorSortValue(b.floor) - nplFloorSortValue(a.floor);
        }

        if (currentNplAuctionSort.key === "area") {
          return currentNplAuctionSort.dir === "asc"
            ? nplSafeNum(a.area) - nplSafeNum(b.area)
            : nplSafeNum(b.area) - nplSafeNum(a.area);
        }

        if (currentNplAuctionSort.key === "unitPrice") {
          return currentNplAuctionSort.dir === "asc"
            ? nplSafeNum(a.unitPrice) - nplSafeNum(b.unitPrice)
            : nplSafeNum(b.unitPrice) - nplSafeNum(a.unitPrice);
        }

        if (currentNplAuctionSort.key === "buildingName") {
          const aa = String(a.buildingName || "");
          const bb = String(b.buildingName || "");
          return currentNplAuctionSort.dir === "asc"
            ? aa.localeCompare(bb, "ko", { numeric: true })
            : bb.localeCompare(aa, "ko", { numeric: true });
        }

        return 0;
      });
      return copied;
    }

    function nplToggleSort(sortState, key) {
      if (sortState.key === key) {
        sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
      } else {
        sortState.key = key;
        sortState.dir = "desc";
      }
    }

    function nplSortArrow(sortState, key) {
      if (sortState.key !== key) return "";
      return sortState.dir === "asc" ? "▲" : "▼";
    }

    function getCurrentNplPopupRect() {
      const popup = document.getElementById("npl-deal-auction-popup");
      if (!popup) return null;
      return popup.getBoundingClientRect();
    }

    function removeNplPyengAnalysisModal() {
      document.getElementById("npl-pyeng-analysis-modal")?.remove();
    }

    function nplParseAnalysisUnitPrice(item) {
      const n = parseFloat(String(item.sortPyeongPrice ?? item.unitPrice ?? "").replace(/[^\d.-]/g, ""));
      return isNaN(n) ? 0 : n;
    }

    function nplGetAnalysisFloorGroup(item) {
      const floorNo = nplGetFloorNumber(item.floor);
      if (floorNo === 1) return "1층";
      if (floorNo === 2) return "2층";
      if (floorNo >= 3) return "상층";
      return String(item.floor || "-");
    }

    function nplGetAnalysisAreaGroup(item) {
      const areaVal = parseFloat(item.exclusive_area_pyeong ?? item.area ?? 0);
      if (isNaN(areaVal)) return "미정";
      if (areaVal < 10) return "9평대";
      return `${Math.floor(areaVal / 10) * 10}평대`;
    }

    function buildNplPyengAnalysisRows(filteredItems) {
      const groups = {};
      const floorTotals = {};

      filteredItems.forEach(item => {
        if (!item.floor) return;

        const floorGroup = nplGetAnalysisFloorGroup(item);
        const areaGroup = nplGetAnalysisAreaGroup(item);
        const unitPrice = nplParseAnalysisUnitPrice(item);

        if (!groups[floorGroup]) {
          groups[floorGroup] = {};
          floorTotals[floorGroup] = { count: 0, sum: 0, min: null, max: null };
        }

        if (!groups[floorGroup][areaGroup]) {
          groups[floorGroup][areaGroup] = { count: 0, sum: 0, min: null, max: null };
        }

        groups[floorGroup][areaGroup].count += 1;
        groups[floorGroup][areaGroup].sum += unitPrice;
        groups[floorGroup][areaGroup].min = groups[floorGroup][areaGroup].min === null ? unitPrice : Math.min(groups[floorGroup][areaGroup].min, unitPrice);
        groups[floorGroup][areaGroup].max = groups[floorGroup][areaGroup].max === null ? unitPrice : Math.max(groups[floorGroup][areaGroup].max, unitPrice);

        floorTotals[floorGroup].count += 1;
        floorTotals[floorGroup].sum += unitPrice;
        floorTotals[floorGroup].min = floorTotals[floorGroup].min === null ? unitPrice : Math.min(floorTotals[floorGroup].min, unitPrice);
        floorTotals[floorGroup].max = floorTotals[floorGroup].max === null ? unitPrice : Math.max(floorTotals[floorGroup].max, unitPrice);
      });

      return { groups, floorTotals };
    }

    function buildNplPyengAnalysisChartHtml(filteredItems) {
      const areaCounts = { "10": 0, "20": 0, "30": 0, "40": 0, "50": 0, "60": 0, "70": 0, "80": 0, "90": 0, "100+": 0 };

      filteredItems.forEach(item => {
        const area = parseFloat(item.exclusive_area_pyeong ?? item.area ?? 0);
        if (area < 20) areaCounts["10"]++;
        else if (area < 30) areaCounts["20"]++;
        else if (area < 40) areaCounts["30"]++;
        else if (area < 50) areaCounts["40"]++;
        else if (area < 60) areaCounts["50"]++;
        else if (area < 70) areaCounts["60"]++;
        else if (area < 80) areaCounts["70"]++;
        else if (area < 90) areaCounts["80"]++;
        else if (area < 100) areaCounts["90"]++;
        else areaCounts["100+"]++;
      });

      const maxVal = Math.max(...Object.values(areaCounts), 1);

      return `
        <div class="npl-pyeng-analysis-chart">
          <div class="npl-pyeng-analysis-chart-title">📊 면적별 매물 분포 (평수 구간)</div>
          <div class="npl-pyeng-analysis-chart-bars">
            ${Object.entries(areaCounts).map(([range, count]) => {
              const h = Math.max((count / maxVal) * 84, 2);
              return `
                <div class="npl-pyeng-analysis-chart-col">
                  <div class="npl-pyeng-analysis-chart-count">${count > 0 ? count : ""}</div>
                  <div class="npl-pyeng-analysis-chart-bar" style="height:${h}px; opacity:${count > 0 ? 1 : 0.18};"></div>
                  <div class="npl-pyeng-analysis-chart-label">${range === "100+" ? "100+평" : `${range}평`}</div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    // 실거래/경매 데이터가 조회되면, 해당 데이터를 표 형태로 팝업 내에 렌더링
    function renderNplDealPopupTable(items) {
      const wrap = document.getElementById("npl-popup-real-wrap");
      if (!wrap) return;

      // [추가] 현재 지역과 이전에 필터링했던 지역이 같으면, 이전 필터값 유지. 다르면 초기화
      const activeRegionKey = currentNplDealAuctionRegionKey || "";
      const useSavedState = currentNplDealFilterState.regionKey === activeRegionKey;

      const prevYearVal =
        document.getElementById("npl-real-filter-year")?.value ||
        (useSavedState ? currentNplDealFilterState.year : "all");

      const prevFloorVal =
        document.getElementById("npl-real-filter-floor")?.value ||
        (useSavedState ? currentNplDealFilterState.floor : "all");

      const prevAreaVal =
        document.getElementById("npl-real-filter-area")?.value ||
        (useSavedState ? currentNplDealFilterState.area : "all");

      const prevAptNameVal =
        document.getElementById("npl-real-filter-apt-name")?.value ||
        (useSavedState ? currentNplDealFilterState.aptName : "");

      const isApartmentType = isNplApartmentTypeRow(currentNplDealAuctionBaseRow);

      if (!items.length) {
        wrap.innerHTML = `<div class="npl-da-empty">실거래 데이터가 없습니다.</div>`;
        return;
      }

      const opt = nplBuildRealFilterOptions(items);

      wrap.innerHTML = `
        <div class="npl-da-filter-bar">
          <span class="npl-da-filter-badge real">🏢 실거래조회</span>
          <label for="npl-real-filter-year">년식</label>
          <select id="npl-real-filter-year">
            <option value="all">전체</option>
            ${opt.years.map(v => `<option value="${v}">${v}</option>`).join("")}
          </select>

          <label for="npl-real-filter-floor">층수</label>
          <select id="npl-real-filter-floor">
            <option value="all">전체</option>
               ${opt.floors.map(v => {
                const label = v === "low" ? "저층" : (v === "high" ? "상층" : nplFloorLabel(v));
                return `<option value="${v}">${label}</option>`;
              }).join("")}
          </select>

          <label for="npl-real-filter-area">평형</label>
          <select id="npl-real-filter-area">
            <option value="all">전체</option>
            ${opt.areas.map(v => `<option value="${v}">${v}평대</option>`).join("")}
          </select>
          ${isApartmentType ? `
            <label for="npl-real-filter-apt-name">아파트명</label>
            <input
              id="npl-real-filter-apt-name"
              type="text"
              value="${String(prevAptNameVal || "").replace(/"/g, "&quot;")}"
              placeholder="아파트명 입력 후 Enter"
              style="
                width:180px;
                height:34px;
                padding:0 10px;
                border:1px solid #d7e3f1;
                border-radius:10px;
                background:#f8fbff;
                font-size:13px;
                font-weight:700;
                color:#0f172a;
                outline:none;
              "
            />
          ` : ``}
          <button type="button" id="npl-real-pyeng-btn" class="npl-da-analysis-btn">평형분석</button>

          <span id="npl-real-filter-count" class="npl-da-filter-count">0건</span>
        </div>

        <div class="npl-da-table-wrap">
          <table class="npl-da-table">
            <colgroup>
              <col style="width:6%">
              <col style="width:11%">
              <col style="width:10%">
              <col style="width:8%">
              <col style="width:15%">
              <col style="width:14%">
              <col style="width:12%">
              <col style="width:24%">
            </colgroup>
            <thead>
              <tr>
                <th>순번</th>
                <th class="npl-da-sortable" id="npl-real-sort-date">거래일자<span class="npl-da-sort-arrow">${nplSortArrow(currentNplDealSort, "date")}</span></th>
                <th class="npl-da-sortable" id="npl-real-sort-build-year">건축년도<span class="npl-da-sort-arrow">${nplSortArrow(currentNplDealSort, "buildYear")}</span></th>
                <th class="npl-da-sortable" id="npl-real-sort-floor">층<span class="npl-da-sort-arrow">${nplSortArrow(currentNplDealSort, "floor")}</span></th>
                <th class="npl-da-sortable" id="npl-real-sort-area">건물면적(평)<span class="npl-da-sort-arrow">${nplSortArrow(currentNplDealSort, "area")}</span></th>
                <th class="npl-da-col-right">거래금액</th>
                <th class="npl-da-sortable npl-da-col-right" id="npl-real-sort-unit-price">평단가<span class="npl-da-sort-arrow">${nplSortArrow(currentNplDealSort, "unitPrice")}</span></th>
                <th class="npl-da-col-left">용도/건물명</th>

            </thead>
            <tbody id="npl-real-tbody"></tbody>
          </table>
        </div>
      `;

      // [추가] 이전 필터값 복원
      const realYearEl = document.getElementById("npl-real-filter-year");

      if (realYearEl && Array.from(realYearEl.options).some(opt => opt.value === prevYearVal)) {

    function setNplPopupLoading(show, text) {

    // 팝업 드래그 기능 바인딩 (팝업 생성 시마다 호출)
    function bindNplDealAuctionPopupDrag() {
      const popup = document.getElementById("npl-deal-auction-popup");
      const handle = document.getElementById("npl-deal-auction-drag-handle");
      if (!popup || !handle) return;

      const interactiveSelector = "button, select, option, input, textarea, a";

      handle.addEventListener("mousedown", function (e) {
        if (e.target.closest(interactiveSelector)) return;

        e.preventDefault();

        const rect = popup.getBoundingClientRect();

        popup.style.left = `${rect.left}px`;
        popup.style.top = `${rect.top}px`;
        popup.style.transform = "none";

        nplDealAuctionDragState.isDragging = true;
        nplDealAuctionDragState.startX = e.clientX;
        nplDealAuctionDragState.startY = e.clientY;
        nplDealAuctionDragState.popupLeft = rect.left;
        nplDealAuctionDragState.popupTop = rect.top;

        document.body.style.userSelect = "none";
      });

      document.addEventListener("mousemove", function (e) {
        if (!nplDealAuctionDragState.isDragging) return;

        const dx = e.clientX - nplDealAuctionDragState.startX;
        const dy = e.clientY - nplDealAuctionDragState.startY;

        popup.style.left = `${nplDealAuctionDragState.popupLeft + dx}px`;
        popup.style.top = `${nplDealAuctionDragState.popupTop + dy}px`;
      });

      document.addEventListener("mouseup", function () {
        if (!nplDealAuctionDragState.isDragging) return;
        nplDealAuctionDragState.isDragging = false;
        document.body.style.userSelect = "";
      });
    }

    // 평형 분석 팝업 열기
    function openNplPyengAnalysisPopup(filteredItems, type) {
      removeNplPyengAnalysisModal();

      const safeItems = Array.isArray(filteredItems) ? filteredItems : [];
      currentNplPyengAnalysisType = type;

      const popupRect = getCurrentNplPopupRect();
      let left = window.innerWidth / 2;
      let top = window.innerHeight / 2;

      if (popupRect) {
        left = popupRect.left + (popupRect.width / 2);
        top = popupRect.top + (popupRect.height / 2);
      }

      const headerText = type === "auction" ? "경매-평형분석" : "실거래-평형분석";

      if (!safeItems.length) {
        document.body.insertAdjacentHTML("beforeend", `
          <div id="npl-pyeng-analysis-modal" class="npl-pyeng-analysis-modal"
               style="left:${left}px; top:${top}px; transform:translate(-50%, -50%);">
            <div class="npl-pyeng-analysis-header">
              <div class="npl-pyeng-analysis-title">${headerText}</div>
              <button type="button" id="npl-pyeng-analysis-close" class="npl-pyeng-analysis-close">×</button>
            </div>
            <div class="npl-pyeng-analysis-body">
              <div class="npl-pyeng-analysis-empty">표시할 데이터가 없습니다.</div>
            </div>
          </div>
        `);

        document.getElementById("npl-pyeng-analysis-close")?.addEventListener("click", removeNplPyengAnalysisModal);
        return;
      }

      const normalizedItems = safeItems.map(item => ({
        ...item,
        cfloor: item.floor,
        exclusive_area_pyeong: item.area,
        sortPyeongPrice: item.sortPyeongPrice || item.unitPrice || item.unitPriceText || "0"
      }));

      const { groups, floorTotals } = buildNplPyengAnalysisRows(normalizedItems);
      const floorOrderMap = { "1층": 1, "2층": 2, "상층": 3 };
      const floorGroupKeys = Object.keys(groups).sort((a, b) => (floorOrderMap[a] || 99) - (floorOrderMap[b] || 99));

      const floorColors = {
        "1층": "#ffeaea",
        "2층": "#eaf4ff",
        "상층": "#ecfff1"
      };

      let tableRowsHtml = "";

      floorGroupKeys.forEach(floorGroup => {
        const areaKeys = Object.keys(groups[floorGroup]).sort((a, b) => {
          if (a === "미정") return 1;
          if (b === "미정") return -1;
          return parseInt(a.replace("평대", ""), 10) - parseInt(b.replace("평대", ""), 10);
        });

        const rowspan = areaKeys.length + 1;
        const floorColor = floorColors[floorGroup] || "#f8fafc";
        let floorRows = "";

        areaKeys.forEach((areaGroup, index) => {
          const groupData = groups[floorGroup][areaGroup];
          const count = groupData.count;
          const avg = count > 0 ? (groupData.sum / count).toFixed(1) : "0";
          const min = count > 0 ? groupData.min.toFixed(1) : "0";
          const max = count > 0 ? groupData.max.toFixed(1) : "0";

          if (index === 0) {
            floorRows += `
              <tr style="background:${floorColor};">
                <td rowspan="${rowspan}" style="font-weight:900;">${floorGroup}</td>
                <td>${areaGroup}</td>
                <td>${count}</td>
                <td>${min}</td>
                <td>${avg}</td>
                <td>${max}</td>
              </tr>
            `;
          } else {
            floorRows += `
              <tr style="background:${floorColor};">
                <td>${areaGroup}</td>
                <td>${count}</td>
                <td>${min}</td>
                <td>${avg}</td>
                <td>${max}</td>
              </tr>
            `;
          }
        });

        const ft = floorTotals[floorGroup];
        const totalCount = ft.count;
        const totalAvg = totalCount > 0 ? (ft.sum / totalCount).toFixed(1) : "0";
        const totalMin = totalCount > 0 ? ft.min.toFixed(1) : "0";
        const totalMax = totalCount > 0 ? ft.max.toFixed(1) : "0";

        floorRows += `
          <tr style="background:#f8fafc; font-weight:900;">
            <td>합계</td>
            <td>${totalCount}</td>
            <td>${totalMin}</td>
            <td>${totalAvg}</td>
            <td>${totalMax}</td>
          </tr>
        `;

        tableRowsHtml += floorRows;
      });

      const chartHtml = buildNplPyengAnalysisChartHtml(normalizedItems);

      document.body.insertAdjacentHTML("beforeend", `
        <div id="npl-pyeng-analysis-modal" class="npl-pyeng-analysis-modal"
             style="left:${left}px; top:${top}px; transform:translate(-50%, -50%);">
          <div class="npl-pyeng-analysis-header">
            <div class="npl-pyeng-analysis-title">${headerText}</div>
            <button type="button" id="npl-pyeng-analysis-close" class="npl-pyeng-analysis-close">×</button>
          </div>
          <div class="npl-pyeng-analysis-body">
            <table class="npl-pyeng-analysis-table">
              <thead>
                <tr>
                  <th>구분</th>
                  <th>평형</th>
                  <th>건수</th>
                  <th>최소</th>
                  <th>평균</th>
                  <th>최대</th>
                </tr>
              </thead>
              <tbody>
                ${tableRowsHtml}
              </tbody>
            </table>
            ${chartHtml}
          </div>
        </div>
      `);

      document.getElementById("npl-pyeng-analysis-close")?.addEventListener("click", removeNplPyengAnalysisModal);
    }

    // 지도 팝업 내 "실거래" 또는 "경매" 버튼 클릭 시, 해당 정보들을 보여주는 팝업 생성
    async function openNplDealAuctionPopup(row, initialTab = "real") {
      console.log("[openNplDealAuctionPopup] 시작", { row, initialTab });

      currentNplDealAuctionBaseRow = row;
      removeNplDealAuctionPopup();
      document.body.insertAdjacentHTML("beforeend", buildNplDealAuctionPopupHtml(row));

      bindNplDealAuctionPopupDrag();

      document.getElementById("npl-popup-close-btn")?.addEventListener("click", removeNplDealAuctionPopup);
      document.getElementById("npl-deal-auction-dim")?.addEventListener("click", removeNplDealAuctionPopup);

      document.getElementById("npl-popup-tab-real")?.addEventListener("click", function () {
        setNplDealAuctionTab("real");
      });
      document.getElementById("npl-popup-tab-auction")?.addEventListener("click", function () {
        setNplDealAuctionTab("auction");
      });

      // 팝업 내 "지도에서 보기" 버튼 클릭 시, 현재 팝업에서 선택된 탭(실거래/경매)에 따라 지도에 마커 표시
      document.getElementById("npl-popup-map-btn")?.addEventListener("click", function () {
        if (currentNplDealAuctionPopupTab === "real") {
          saveNplRealFilterState(currentNplDealAuctionRegionKey);
        } else if (currentNplDealAuctionPopupTab === "auction") {
          saveNplAuctionFilterState(currentNplDealAuctionRegionKey);
        } else {
          saveNplRealFilterState(currentNplDealAuctionRegionKey);
          saveNplAuctionFilterState(currentNplDealAuctionRegionKey);
        }

        setNplDealAuctionMapData(currentNplDealAuctionPopupTab);
        removeNplDealAuctionPopup();
      });

      setNplDealAuctionTab(initialTab);

      // 같은 지역이면 기존 데이터 재사용, 아니면 새로 조회
      currentNplDealAuctionBaseRow = row;
      const nextRegionKey = getNplDealAuctionRegionKey(row);
      const canReuse =
        currentNplDealAuctionRegionKey &&
        currentNplDealAuctionRegionKey === nextRegionKey &&
        Array.isArray(currentNplDealRows) &&
        Array.isArray(currentNplAuctionRows) &&
        (currentNplDealRows.length || currentNplAuctionRows.length);

      // 지역이 변경되었는데도 재사용 가능한 데이터가 있으면, 사용자에게 선택권 제공
      const isRegionChanged =
        currentNplDealAuctionRegionKey &&
        currentNplDealAuctionRegionKey !== nextRegionKey;

      if (isRegionChanged) {
        resetNplDealAuctionFilterState(nextRegionKey);
      }

      try {
        if (canReuse) {
          console.log("[openNplDealAuctionPopup] 같은 지역 -> 기존 실거래/경매 데이터 재사용", nextRegionKey);
          renderNplDealPopupTable(currentNplDealRows || []);
          renderNplAuctionPopupTable(currentNplAuctionRows || []);
          setNplDealAuctionTab(initialTab);
          return;
        }

        currentNplDealAuctionRegionKey = nextRegionKey;
        resetNplDealAuctionFilterState(nextRegionKey);
        currentNplDealFilteredRows = [];
        currentNplAuctionFilteredRows = [];

        console.log("[openNplDealAuctionPopup] 실거래 조회 시작 => ", selectedLawdCd, selectedUmdNm, selectedFullNm);
        setNplPopupLoading(true, "실거래 데이터 가져오는중...");
        currentNplDealRows = await fetchNplRelatedDealData(row);
        renderNplDealPopupTable(currentNplDealRows);

        console.log("[openNplDealAuctionPopup] 경매 조회 시작");
        setNplPopupLoading(true, "경매 데이터 가져오는중...");
        currentNplAuctionRows = await fetchNplRelatedAuctionData(row);
        renderNplAuctionPopupTable(currentNplAuctionRows);

        setNplDealAuctionTab(initialTab);
      } catch (err) {
        console.error(err);
        alert("실거래/경매 데이터를 가져오는 중 오류가 발생했습니다.");
      } finally {
        setNplPopupLoading(false);
      }
    }

    function setNplDealAuctionMapData(type) {
      let rows = [];

      if (type === "real") {
        rows = (currentNplDealFilteredRows && currentNplDealFilteredRows.length)
          ? currentNplDealFilteredRows
          : (currentNplDealRows || []);
      } else if (type === "auction") {
        rows = (currentNplAuctionFilteredRows && currentNplAuctionFilteredRows.length)
          ? currentNplAuctionFilteredRows
          : (currentNplAuctionRows || []);
      } else {
        // type === "all": 실거래 + 경매 합산
        rows = [
          ...((currentNplDealFilteredRows && currentNplDealFilteredRows.length)
            ? currentNplDealFilteredRows
            : (currentNplDealRows || [])),
          ...((currentNplAuctionFilteredRows && currentNplAuctionFilteredRows.length)
            ? currentNplAuctionFilteredRows
            : (currentNplAuctionRows || []))
        ];
      }

      // [수정] address fallback 구성용 기본 지역 텍스트
      // currentNplDealAuctionBaseRow 가 없을 때도 selectedFullNm / selectedUmdNm 으로 보완
      const baseRow = currentNplDealAuctionBaseRow || {};
      const fallbackAddress = [
        baseRow.region || (selectedFullNm || "").split(/\s+/)[0] || "",
        baseRow.sigungu_name || (selectedFullNm || "").split(/\s+/)[1] || "",
        baseRow.eub_myeon_dong || selectedUmdNm || ""
      ].filter(Boolean).join(" ").trim();

      addresses = (rows || [])
        .map(item => {
          const raw = item.raw || {};

          const latitude = parseFloat(
            item.latitude ??
            item.lat ??
            raw.latitude ??
            raw.lat ??
            raw.y ??
            0
          ) || 0;

          const longitude = parseFloat(
            item.longitude ??
            item.lng ??
            item.lon ??
            raw.longitude ??
            raw.lng ??
            raw.lon ??
            raw.x ??
            0
          ) || 0;

          // [수정] itemType 결정 — type==="all" 시 빈 문자열 방지
          // 우선순위: item.type → item.raw.type → 경매 고유 필드 판별 → 기본 "real"
          let itemType = String(item.type || "").trim();
          if (!itemType) {
            const rawType = String(raw.type || "").trim();
            if (rawType === "real" || rawType === "auction") {
              itemType = rawType;
            } else if (type === "real") {
              itemType = "real";
            } else if (type === "auction") {
              itemType = "auction";
            } else {
              // type === "all": 경매는 caseNumber / case_number / sales_date 필드를 가짐
              const isAuction = !!(
                item.caseNumber ||
                raw.case_number ||
                raw.sales_date ||
                item.date && raw.sales_date !== undefined
              );
              itemType = isAuction ? "auction" : "real";
            }
          }

          // [수정] address 결정 — item.address 가 있으면 우선 사용, 없으면 fallbackAddress
          const addressText = String(item.address || "").trim() || fallbackAddress;

          // [수정] floor 가공 — 이미 "층"이 포함된 경우 중복 방지 ("1층층" → "1층")
          const rawFloor = String(item.floor || "").trim();
          const floorText = rawFloor
            ? (rawFloor.endsWith("층") ? rawFloor : `${rawFloor}층`)
            : "";

          return {
            type: itemType,
            address: addressText,
            buildingName: item.buildingName || item.useText || "",
            date: item.date || "",
            year: "",
            floor: floorText,
            area: item.area ? `${item.area}평` : "",
            unitPrice: item.unitPriceText || "-",
            price: item.priceText || "-",
            latitude,
            longitude
          };
        })
        // [핵심 수정]
        // 좌표가 있으면 통과
        // 좌표가 없어도 주소가 있으면 plotByType -> geocodeIfNeeded()가 처리할 수 있도록 남긴다
        .filter(item => {
          const hasLatLng = item.latitude > 0 && item.longitude > 0;
          const hasAddress = !!String(item.address || "").trim();
          return hasLatLng || hasAddress;
        });

      console.log("[setNplDealAuctionMapData] type =", type);
      console.log("[setNplDealAuctionMapData] rows =", rows);
      console.log("[setNplDealAuctionMapData] addresses =", addresses);

      const selectEl = document.getElementById("deal-type-filter-select");
      if (selectEl) {
        selectEl.value = type;
      }

      if (type === "hide") {
        clearDealAuctionMarkers();
        return;
      }

      clearDealAuctionMarkers();
      plotByType(type);
    }

    async function getCurrentNplRegionInfo(accessToken = '') {
      console.log('==== getCurrentNplRegionInfo - 시작',
        selectedLawdCd,
        selectedUmdNm, selectedFullNm
      );
      // 현재는 선택된 지역명(selectedFullNm)을 경기도 김포시 운양동
      const queryLawdName = selectedFullNm;

      if (!queryLawdName) {

          regionKey: ''
        };

      // 법정동코드 API 호출 : 경기도 김포시 운양동
      const url = new URL(`/api/lawdcd/single`, window.location.origin);
      url.searchParams.set('lawd_name', queryLawdName);

      const headers = {};
      if (accessToken) {
        headers['Authorization'] = `Bearer ${accessToken}`;
      }

      const response = await fetch(url.toString(), {

        headers
      });

      if (!response.ok) {

      }

      const result = await response.json();

    function safeDigitsOnly(value) {
      return String(value || "").replace(/[^\d]/g, "");
    }

    function formatNumberWithComma(value) {
      const digits = safeDigitsOnly(value);
      if (!digits) return "";
      return Number(digits).toLocaleString("ko-KR");
    }

    function parseMinimumPrice(value) {
      if (!value) {
        return {
          rate: "-",
          price: "-"
        };
      }

      const str = String(value).trim();

      // (34.3%) 242844000 형태 분리
      const match = str.match(/\(([^)]+)\)\s*([\d,]+)/);
      if (match) {
        const rate = match[1]; // 34.3%
        const priceRaw = match[2];

        const num = Number(priceRaw.replace(/,/g, ""));
        const price = isNaN(num) ? priceRaw : num.toLocaleString();

        return {
          rate: rate,
          price: price
        };
      }

      // 혹시 숫자만 들어온 경우 대비
      const num = Number(str.replace(/,/g, ""));
      return {
        rate: "-",
        price: isNaN(num) ? str : num.toLocaleString()
      };
    }

        // "경기도 김포시 운양동"
        // "서울특별시 강남구 역삼동"

          umd: parts.slice(2).join(" ") || ""
        };
