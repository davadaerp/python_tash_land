<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>실거래/경매 검색</title>
  <style>
    body { margin:0; display:flex; flex-direction:column; height:100vh; font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; }
    #controls {
      padding:10px;
      background:#f7f7f8;
      display:flex;
      align-items:center;
      gap:12px;
      border-bottom:1px solid #ececef;
    }
    #controls label { margin-right:4px; }
    .legend { display:flex; align-items:center; gap:6px; font-size:14px; color:#333; }
    .legend-marker { width:12px; height:12px; border-radius:50%; display:inline-block; }
    #map { flex:1; }

    /* ====== 팝업(커스텀 오버레이) ====== */
    .custom-popup {
      position:absolute;
      transform: translate(10px, -50%);
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      overflow:hidden;
      min-width: 320px;
      max-width: 480px;
      z-index: 1000;
      animation: popIn 120ms ease-out;
    }
    @keyframes popIn {
      from { opacity:0; transform: translate(10px, -50%) scale(0.98); }
      to   { opacity:1; transform: translate(10px, -50%) scale(1); }
    }

    .custom-popup__header {
      position:relative;
      padding:12px 16px 8px 16px;
      color:#fff;
      display:flex;
      align-items:flex-start;
      gap:10px;
    }
    .header-title { display:flex; flex-direction:column; gap:2px; flex:1; }
    .header-title .addr { font-weight:800; font-size:15px; line-height:1.2; }
    .header-title .bname { font-weight:600; font-size:13px; opacity:.95; }

    .close-x {
      position:absolute; top:10px; right:12px;
      width:28px; height:28px;
      display:grid; place-items:center;
      border-radius:8px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color:#fff; cursor:pointer; font-weight:800;
      backdrop-filter: blur(2px);
    }
    .close-x:hover { background: rgba(255,255,255,0.25); }

    /* 타입별 헤더 배경 */
    .type-real { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .type-auction { background: linear-gradient(135deg, #ef4444, #f97316); }
    .type-mixed { background: linear-gradient(135deg, #64748b, #94a3b8); }

    /* 상단 필터(라벨 리스트) */
    .popup-filters {
      display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;
    }
    .filter-btn {
      appearance:none; border:none; cursor:pointer;
      padding:6px 10px; border-radius:9999px;
      font-size:12px; font-weight:800; line-height:1;
      background: rgba(255,255,255,0.18);
      color:#fff; border:1px solid rgba(255,255,255,0.35);
      transition: transform .06s ease, background .12s ease;
      white-space:nowrap;
    }
    .filter-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.28); }
    .filter-btn.selected { background:#fff; color:#111827; border-color:#fff; }

    .custom-popup__body { padding:12px 14px 14px 14px; background:#fafafa; }
    .table-wrap { background:#fff; border:1px solid #eef0f2; border-radius:12px; overflow:hidden; }
    table { border-collapse: collapse; width:100%; font-size:13px; table-layout:auto; }
    thead { background:#f3f4f6; }
    thead th { text-align:left; padding:10px 12px; font-weight:700; color:#111827; border-bottom:1px solid #e5e7eb; }
    thead th.price-per { text-align:center; }
    tbody td { padding:10px 12px; border-bottom:1px solid #f1f5f9; color:#111827; }
    tbody tr:hover { background:#f9fafb; }
    tbody td.price-per { text-align:center; }

    /* 구분 Pill */
    .pill { display:inline-block; padding:4px 8px; border-radius:9999px; font-weight:800; font-size:12px; white-space:nowrap; }
    .pill-real { background:#dcfce7; color:#166534; }
    .pill-auction { background:#fee2e2; color:#991b1b; }

    /* ====== 마커(원+숫자) ====== */
    .count-marker {
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:14px; font-weight:800;
      box-shadow:0 2px 8px rgba(0,0,0,0.25);
      border:2px solid rgba(255,255,255,0.7);
      user-select:none;
    }
    .marker-real { background:#16a34a; }
    .marker-auction { background:#ef4444; }
    .marker-mixed { background: conic-gradient(#16a34a 0 50%, #ef4444 50% 100%); }

    #optionInfo { font-weight:600; color:#111827; }

    /* 경매 필터 버튼 전용 */
    .filter-btn.auction {
      background:#ef4444;
      border-color:#ef4444;
      color:#fff;
    }
    .filter-btn.auction:hover {
      filter: brightness(0.95);
    }
    .filter-btn.auction.selected {
      background:#ef4444;
      border-color:#ef4444;
      color:#fff;
    }

    /* 기존 CSS 아래에 추가 */
    thead th .sort-arrow {
      margin-left: 4px;
      opacity: .65;
      font-size: 11px;
    }

    /* 평당가 정렬 화살표 */
    th.price-per .sort-arrow {
      margin-left: 4px;
      opacity: .65;
      font-size: 11px;
    }

    /* =========================
       [추가] 주변 레이어 버튼 / 패널
    ========================= */
    .commercial-nearby-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-right: 0px;
      z-index: 30;
    }

    .commercial-nearby-btn {
      height: 34px;
      padding: 0 14px;
      border: 1px solid #2563eb;
      border-radius: 18px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
      transition: all 0.18s ease;
    }

    .commercial-nearby-btn:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
      transform: translateY(-1px);
    }

    .commercial-nearby-panel {
      position: absolute;
      top: 38px; /* 버튼(34px)과 4px 차이로 좁힘 */
      left: 0;
      width: 240px;
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.16);
      overflow: hidden;
      opacity: 0;
      transform: translateY(-4px); /* 시작 위치를 더 가깝게 변경 */
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .commercial-nearby-wrap.open .commercial-nearby-panel {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .commercial-nearby-header {
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #1e3a8a;
      background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .commercial-nearby-close {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .commercial-nearby-close:hover {
      background: #bfdbfe;
      transform: scale(1.06);
    }

    .commercial-nearby-list {
      max-height: 360px;
      overflow-y: auto;
      padding: 6px;
    }

    .commercial-nearby-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin: 2px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .commercial-nearby-item:hover {
      background: #eff6ff;
      transform: translateY(-1px);
    }

    .commercial-nearby-item.active {
      background: #dbeafe;
    }

    .commercial-nearby-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: #eff6ff;
      flex: 0 0 26px;
    }

    .commercial-nearby-text {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      color: #111827;
      font-weight: 600;
    }

    .commercial-nearby-count {
      font-size: 13px;
      color: #2563eb;
      font-weight: 700;
    }

    /* =========================
       [추가] 업종명 툴팁
    ========================= */
    .commercial-marker-tooltip {
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
    }

    /* =========================
       [수정] 업종 1등/2등 건물 하이라이트
    ========================= */
    .commercial-poi-marker-rank1,
    .commercial-poi-marker-rank2 {
      transform-origin: center center;
    }

    .commercial-poi-marker-rank1 {
      animation: commercialPoiPulseRank1 1.15s ease-in-out infinite;
    }

    .commercial-poi-marker-rank2 {
      animation: commercialPoiPulseRank2 1.45s ease-in-out infinite;
    }

    .commercial-poi-marker-rank1 .commercial-poi-core {
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.95),
        0 0 0 10px rgba(239, 68, 68, 0.26),
        0 0 18px rgba(239, 68, 68, 0.35),
        0 10px 24px rgba(15,23,42,0.35);
      border: 3px solid #ffffff !important;
      filter: saturate(1.18) contrast(1.08);
    }

    .commercial-poi-marker-rank2 .commercial-poi-core {
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.95),
        0 0 0 10px rgba(168, 85, 247, 0.24),
        0 0 18px rgba(168, 85, 247, 0.30),
        0 10px 24px rgba(15,23,42,0.30);
      border: 3px solid #ffffff !important;
      filter: saturate(1.12) contrast(1.05);
    }

    .commercial-poi-marker-rank1 .commercial-poi-badge {
      background: #dc2626 !important;
      color: #fff !important;
      box-shadow:
        0 0 0 2px #fff,
        0 6px 14px rgba(220,38,38,0.35);
    }

    .commercial-poi-marker-rank2 .commercial-poi-badge {
      background: #7c3aed !important;
      color: #fff !important;
      box-shadow:
        0 0 0 2px #fff,
        0 6px 14px rgba(124,58,237,0.35);
    }

    .commercial-poi-rank-label {
      position: absolute;
      left: 50%;
      top: -30px;
      transform: translateX(-50%);
      padding: 3px 8px;
      border-radius: 999px;
      color: #fff;
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      letter-spacing: -0.2px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.22);
      pointer-events: none;
    }

    .commercial-poi-rank-label.rank1 {
      background: #111827;
    }

    .commercial-poi-rank-label.rank2 {
      background: #581c87;
    }

    .commercial-poi-rank-label::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -5px;
      width: 8px;
      height: 8px;
      transform: translateX(-50%) rotate(45deg);
    }

    .commercial-poi-rank-label.rank1::after {
      background: #111827;
    }

    .commercial-poi-rank-label.rank2::after {
      background: #581c87;
    }

    @keyframes commercialPoiPulseRank1 {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    @keyframes commercialPoiPulseRank2 {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }


    /* =========================
    [추가] 거리재기 UI
    ========================= */
    #measure-distance-btn,
    #measure-clear-btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1;
      letter-spacing:-0.2px;
    }

    #measure-distance-btn:hover {
      background:#dc2626;
      border-color:#dc2626;
      transform: translateY(-1px);
    }

    #measure-distance-btn.active {
      background:#b91c1c;
      border-color:#b91c1c;
      box-shadow:0 4px 12px rgba(185,28,28,0.28);
    }

    #measure-clear-btn:hover {
      background:#fee2e2;
      border-color:#f87171;
      transform: translateY(-1px);
    }

    .measure-guide-overlay {
      padding:12px 16px;
      border-radius:14px;
      background:rgba(51, 65, 85, 0.92);   /* 기존 검정색 → 부드러운 슬레이트톤 */
      color:#fff;
      font-size:12px;
      font-weight:800;
      line-height:1.5;
      white-space:nowrap;
      box-shadow:0 8px 22px rgba(15,23,42,0.20);
      border:1px solid rgba(255,255,255,0.14);
      letter-spacing:-0.1px;
    }

    .measure-distance-label {
      padding:7px 12px;
      border-radius:999px;
      background:#ef4444;
      color:#fff;
      font-size:12px;
      font-weight:800;
      line-height:1.2;
      white-space:nowrap;
      box-shadow:0 4px 14px rgba(239,68,68,0.28);
    }

    .measure-total-label {
      padding:10px 14px;
      border-radius:14px;
      background:rgba(51, 65, 85, 0.96);   /* 기존 검정색 → 부드러운 톤 */
      color:#fff;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      box-shadow:0 8px 20px rgba(15,23,42,0.22);
      border:1px solid rgba(255,255,255,0.12);
    }

    .measure-result-card {
      min-width: 210px;
      max-width: 260px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(17,24,39,0.96);
      color: #fff;
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .measure-result-card::after {
      content: "";
      position: absolute;
      left: 18px;
      bottom: -8px;
      width: 14px;
      height: 14px;
      background: rgba(17,24,39,0.96);
      transform: rotate(45deg);
      border-right: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .measure-result-card .title {
      font-size: 12px;
      font-weight: 700;
      opacity: .9;
      margin-bottom: 6px;
    }

    .measure-result-card .total {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
      color: #fca5a5;
    }

    .measure-result-card .meta {
      font-size: 12px;
      line-height: 1.55;
      color: rgba(255,255,255,0.92);
    }

    .measure-result-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .measure-result-close:hover {
      background: rgba(255,255,255,0.24);
    }

    /* =========================
    [추가] 현재 선택된 주변 업종 배지
    ========================= */
    #commercial-selected-group-badge {
      display: none;
      align-items: center;
      justify-content: center;
      height: 34px;
      padding: 0 14px;
      margin-left: 0px;
      border-radius: 18px;
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border: 1px solid #93c5fd;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.2px;
      box-shadow: 0 3px 10px rgba(37, 99, 235, 0.12);
      white-space: nowrap;
    }

    #commercial-selected-group-badge.is-empty {
      background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
      border: 1px solid #d1d5db;
      color: #64748b;
    }

    #commercial-selected-group-badge .label {
      opacity: 0.9;
      margin-right: 6px;
    }

    #commercial-selected-group-badge .value {
      color: #0f172a;
      font-weight: 900;
    }

    /* =========================
      [추가] NPL 2단 레이아웃
      - left : 검색/목록
      - right : controls/map
    ========================= */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f3f7fb;
    }

    #npl-layout {
      --npl-left-panel-width: 420px;              /* 펼침 폭 */
      --npl-left-panel-collapsed-width: 22px;     /* 접힘시 살짝 보이는 핸들 폭 */
      --npl-left-panel-slide-duration: 340ms;     /* 슬라이드 속도 */
      --npl-left-panel-slide-easing: cubic-bezier(0.22, 1, 0.36, 1); /* 고급 easing */

      display: flex;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #npl-left-panel {
      width: var(--npl-left-panel-width);
      min-width: 0;
      max-width: none;
      height: 100vh;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      border-right: 1px solid #dbe5ef;
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 12px;
      overflow: hidden;
      box-shadow: 4px 0 18px rgba(15, 23, 42, 0.04);

      position: relative;
      z-index: 15;
      flex: 0 0 auto;

      transition:
        width var(--npl-left-panel-slide-duration) var(--npl-left-panel-slide-easing),
        padding var(--npl-left-panel-slide-duration) var(--npl-left-panel-slide-easing),
        border-color var(--npl-left-panel-slide-duration) ease,
        box-shadow var(--npl-left-panel-slide-duration) ease,
        opacity var(--npl-left-panel-slide-duration) ease;
    }

    #npl-right-panel {
      flex: 1;
      min-width: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
      position: relative;
      transition: margin var(--npl-left-panel-slide-duration) var(--npl-left-panel-slide-easing);
    }

    /* 접힌 상태 */
    #npl-layout.left-panel-collapsed #npl-left-panel {
      width: var(--npl-left-panel-collapsed-width);
      padding-left: 0;
      padding-right: 0;
      padding-top: 14px;
      padding-bottom: 14px;
      border-right-color: rgba(147, 197, 253, 0.45);
      box-shadow: 2px 0 14px rgba(37, 99, 235, 0.08);
    }

    /* 접힐 때 내부 내용은 자연스럽게 사라짐 */
    #npl-left-panel > * {
      transition:
        opacity 180ms ease,
        transform 220ms ease;
    }

    #npl-layout.left-panel-collapsed #npl-left-panel > *:not(.npl-left-collapse-rail) {
      opacity: 0;
      transform: translateX(-14px);
      pointer-events: none;
    }

    /* 접힌 뒤에도 보이는 세로 핸들 */
    .npl-left-collapse-rail {
      position: absolute;
      top: 14px;
      right: 0;
      bottom: 14px;
      width: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .npl-left-collapse-rail::before {
      content: "";
      width: 6px;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
      box-shadow:
        0 0 0 4px rgba(219, 234, 254, 0.85),
        0 8px 18px rgba(37, 99, 235, 0.18);
      opacity: 0;
      transform: scaleY(0.85);
      transition: all 220ms ease;
    }

    #npl-layout.left-panel-collapsed .npl-left-collapse-rail::before {
      opacity: 1;
      transform: scaleY(1);
    }

    /* 상단 토글 버튼 */
    .npl-left-toggle-btn {
      height: 36px;
      min-width: 124px;
      padding: 0 14px;
      border: 1px solid #93c5fd;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffffff 0%, #eff6ff 100%);
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.10);
      transition:
        transform .18s ease,
        box-shadow .18s ease,
        background .18s ease,
        border-color .18s ease;
    }

    .npl-left-toggle-btn:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border-color: #60a5fa;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.16);
    }

    .npl-left-toggle-btn:active {
      transform: translateY(0);
    }

    .npl-left-toggle-btn .arrow {
      font-size: 14px;
      transition: transform var(--npl-left-panel-slide-duration) var(--npl-left-panel-slide-easing);
    }

    #npl-layout.left-panel-collapsed .npl-left-toggle-btn .arrow {

  <!-- 네이버 지도 SDK (v3 openAPI) -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=dd72ip9z43&submodules=geocoder"></script>
  <script>
    let currentOverlay = null;
    let markers = [];
    let addresses = null;
    let groups = [];
    let bounds = null;

    // =========================
    // [추가] LEFT 패널 슬라이드 토글 설정

    let isNplLeftPanelCollapsed = false;

    // =========================
    // [추가] 상권 업종정보 전역변수
    // =========================
    let commercialAreaItems = [];
    let currentCommercialAreaGrouped = null;
    let currentCommercialAreaSelectedLcls = "전체";
    // [추가] 마지막 상권정보 조회 지역 상태
    let currentCommercialAreaRegionKey = "";
    let currentCommercialAreaLawdCd = "";
    let currentCommercialAreaLawdName = "";
    let currentPanelAccessToken = "{{ access_token }}";
    // =========================
    // [추가] 상권분석 상세 모달 상태
    // =========================
    let currentCommercialAreaSelectedMcls = "";
    let currentCommercialAreaDetailItems = [];
    let currentCommercialAreaDetailSearch = "";

    // =========================
    // [추가] 상권 업종 POI 표시용 전역변수
    // =========================
    let commercialPoiMarkers = [];
    let commercialPoiTooltipOverlay = null;
    let currentCommercialPoiGroup = "";

    // =========================
    // [추가] 업종분석 초기 표시 설정값
    // =========================
    let initialMapMode = "";
    let initialCommercialPoiGroup = "";

    // =========================
    // [추가] 거리재기 전역 상태
    // =========================
    let isMeasureMode = false;
    let measurePoints = [];
    let measureLine = null;
    let measureTempLine = null;
    let measureSegmentOverlays = [];
    let measureTotalOverlay = null;
    let measureGuideOverlay = null;

    // [추가] 거리재기 점(시작/중간/끝) 마커
    let measurePointMarkers = [];

    let commercialAreaPopupDragState = {
      isDragging: false,
      startX: 0,
      startY: 0,
      popupLeft: 0,
      popupTop: 0
    };

    const map = new naver.maps.Map('map', {
      center: new naver.maps.LatLng(37.5665, 126.9780),
      zoom: 12
    });

    /* ===== 유틸 ===== */
    function parseDateKey(s) {
      if (!s) return -Infinity;
      const digits = String(s).replace(/[^\d]/g, '');
      if (digits.length === 8) return parseInt(digits, 10);
      if (digits.length === 6) return parseInt('20' + digits, 10);
      return parseInt(digits, 10) || -Infinity;
    }
    function extractIntString(val) {
      const m = String(val ?? '').match(/-?\d+(?:\.\d+)?/);
      if (!m) return '';
      const v = Math.trunc(parseFloat(m[0]));
      return String(v);
    }
    function typeMeta(items) {
      const hasReal = items.some(it => it.type === 'real');
      const hasAuction = items.some(it => it.type === 'auction');
      if (hasReal && hasAuction) return { marker:'marker-mixed', header:'type-mixed', label:'혼합', hasReal, hasAuction };
      if (hasReal) return { marker:'marker-real', header:'type-real', label:'실거래', hasReal:true, hasAuction:false };
      return { marker:'marker-auction', header:'type-auction', label:'경매', hasReal:false, hasAuction:true };
    }
    function cleanAuctionAddress(addr) {
      if (!addr) return addr;
      let s = String(addr);
      s = s.replace(/\s*,?\s*(지하?\d*층|\d+층|저층|고층)\s*[^\s,()]*호(?=\s*\()/gi, '');
      s = s.replace(/\s*,?\s*(지하?\d*층|\d+층|저층|고층)\s*(?=,|\(|$)/gi, '');
      s = s.replace(/\s*,?\s*[^\s,()]*호(?=,|\(|$)/gi, '');
      s = s.replace(/\s{2,}/g, ' ').replace(/\s*,\s*,/g, ',').replace(/\(\s*,\s*/g, '(').replace(/\s*,\s*\)/g, ')');
      return s.trim();
    }
    function groupByLocation(list) {
      const mp = new Map();
      for (const it of list) {
        const lat = parseFloat(it.latitude) || 0;
        const lng = parseFloat(it.longitude) || 0;
        const key = (lat && lng) ? `${lat.toFixed(6)},${lng.toFixed(6)}` : (it.address || '').trim();
        if (!key) continue;
        if (!mp.has(key)) mp.set(key, []);
        mp.get(key).push(it);
      }
      return Array.from(mp.entries()).map(([key, arr]) => {
        let lat = parseFloat(arr[0].latitude) || 0;
        let lng = parseFloat(arr[0].longitude) || 0;
        const address = (arr[0].address || '').trim();
        return { key, items: arr, lat, lng, address };
      });
    }
    function geocodeIfNeeded(group, done) {
      if (group.lat && group.lng) { done && done(group); return; }
      if (!group.address) { done && done(null); return; }
      naver.maps.Service.geocode({ query: group.address }, (status, response) => {
        if (status === naver.maps.Service.Status.OK && response.v2.addresses.length) {
          const addr = response.v2.addresses[0];
          group.lat = parseFloat(addr.y);
          group.lng = parseFloat(addr.x);
          done && done(group);
        } else { console.error('Geocode failed:', group.address, status); done && done(null); }
      });
    }

    function createCountMarker(group) {
      const meta = typeMeta(group.items);
      const count = group.items.length;
      const pos = new naver.maps.LatLng(group.lat, group.lng);

      const marker = new naver.maps.Marker({
        position: pos,
        map,
        icon: {
          content: `<div class="count-marker ${meta.marker}" title="${group.address}">${count}</div>`,
          anchor: new naver.maps.Point(17, 17) /* 원 34px 기준 */
        }
      });

      marker.addListener('click', () => openCustomPopup(group, pos));
      markers.push(marker);
      bounds.extend(pos);
    }

    /* 행 HTML 생성 (선택 필터에 맞게) */
    function buildRowsHTML(itemsSorted, selectedFilter) {
      const filtered = itemsSorted.filter(it => {
        if (selectedFilter === 'all') return true;
        return it.type === selectedFilter;
      });
      return filtered.map(it => {
        const date = it.date || '';
        const floorText = extractIntString(it.floor);
        const areaText  = extractIntString(it.area);
        const unitPrice = it.unitPrice ?? '';  // 이미 전처리된 값 사용
        const price = it.price ?? '';

        const isReal = it.type === 'real';
        const pillClass = isReal ? 'pill-real' : 'pill-auction';
        const pillText = isReal ? '실거래' : '경매';

        return `
          <tr>
            <td style="font-weight:800;"><span class="pill ${pillClass}">${pillText}</span></td>
            <td>${date}</td>
            <td>${floorText}</td>
            <td>${areaText}</td>
            <td class="price-per">${unitPrice}</td>
            <td style="text-align:right;">${price}</td>
          </tr>
        `;
      }).join('');
    }

    /* ===== 팝업 HTML 생성 ===== */
    function buildPopupHTML(group) {
      // 정렬: 실거래 → 경매, 각 구분 내부는 최신일자
      const itemsSorted = [...group.items].sort((a, b) => {
        const typeA = a.type === 'real' ? 0 : 1;
        const typeB = b.type === 'real' ? 0 : 1;
        if (typeA !== typeB) return typeA - typeB;
        return parseDateKey(b.date) - parseDateKey(a.date);
      });

      const meta = typeMeta(itemsSorted);
      // ─ 경매(type==='auction') 항목에서 이름을 우선 사용
      let building = '';
      const hasReal = (itemsSorted || []).some(it => it.type === 'real');
      const auctionOnly = (itemsSorted || []).every(it => it.type === 'auction');

      if (auctionOnly && !hasReal) {
        // 같은 번지 묶음이 '경매만' 존재하는 경우: building 비우기
        building = '';
      } else {
        // 경매에 이름이 있으면 우선 사용
        const auctionWithName = (itemsSorted || []).find(
          it => it.type === 'auction' && it.buildingName
        );
        if (auctionWithName) {
          building = auctionWithName.buildingName;
        } else {
          // 경매에 없으면 아무 항목이나 이름이 있는 걸로 대체
          const anyWithName = (itemsSorted || []).find(it => it.buildingName);
          building = anyWithName ? anyWithName.buildingName : '';
        }
      }
      //alert(building);

      const headerAddr = (meta.label === '경매')
        ? cleanAuctionAddress(group.address || '주소 미상')
        : (group.address || '주소 미상');

      // 건수 계산
      const totalCount   = itemsSorted.length;
      const realCount    = itemsSorted.filter(it => it.type === 'real').length;
      const auctionCount = itemsSorted.filter(it => it.type === 'auction').length;

      const selectedAssetLabel = String(getMapAssetTypeSelectValue() || selectedAssetType || "상가").trim();

      // 필터 버튼 구성 (텍스트에 건수 포함)
      const filterOptions = [];
      if (meta.hasReal && meta.hasAuction) {
        filterOptions.push({key:'all',     text:`${selectedAssetLabel} 전체 (${totalCount})`});
        filterOptions.push({key:'real',    text:`${selectedAssetLabel} 실거래 (${realCount})`});
        filterOptions.push({key:'auction', text:`${selectedAssetLabel} 경매 (${auctionCount})`});
      } else if (meta.hasReal) {
        filterOptions.push({key:'real',    text:`${selectedAssetLabel} 실거래 (${realCount})`});
      } else {
        filterOptions.push({key:'auction', text:`${selectedAssetLabel} 경매 (${auctionCount})`});
      }
      const defaultFilter = filterOptions[0].key; // 혼합이면 all, 아니면 단일 항목

      // 필터 버튼 HTML
      const filterButtonsHTML = `
        <div class="popup-filters" data-filterbar>
          ${filterOptions.map((opt, idx) =>
            `<button class="filter-btn ${opt.key==='auction'?'auction':''} ${idx===0?'selected':''}" data-filter="${opt.key}">${opt.text}</button>`
          ).join('')}
        </div>
      `;

      // 초기 테이블 rows
      const initialRows = buildRowsHTML(itemsSorted, defaultFilter);

      return {
        html: `
          <div class="custom-popup ${meta.header}">
            <div class="custom-popup__header ${meta.header}">
              <div class="header-title">
                <div class="addr">
                    ${headerAddr}${building ? ` <span class="bname" style="font-weight:600; font-size:13px; opacity:.9;">(${building})</span>` : ``}
                </div>
                ${filterButtonsHTML}
              </div>
              <div class="close-x" data-close>×</div>
            </div>
            <div class="custom-popup__body">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>구분</th>
                      <th>거래일자</th>
                      <th>층</th>
                      <th class="area-col">평수(계약)</th>
                      <th class="price-per">평당가</th>
                      <th style="text-align:right;">금액</th>
                    </tr>
                  </thead>
                  <tbody data-tbody>
                    ${initialRows}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        `,
        itemsSorted,
        defaultFilter
      };
    }

    // === [ADD] 평수 숫자 파싱 헬퍼 ===
    function parseAreaNumber(v) {
      if (v == null) return NaN;
      const s = String(v).trim();
      if (s === '' || s === '-') return NaN;
      // 소수 포함 숫자만 추출 (예: '33.7평' → 33.7)
      const m = s.match(/-?\d+(?:\.\d+)?/);
      return m ? parseFloat(m[0]) : NaN;
    }

    // "36,000,000" / "36만" / "36만 원" / "-" 등에서 숫자만 뽑아 정렬용으로 사용
    function parseCurrencyNumber(v) {
      if (v == null) return NaN;
      const s = String(v).trim();
      if (s === '' || s === '-' ) return NaN;
      // "36만" 같은 경우를 대비: 만(=10,000) 단위 처리
      const manMatch = s.match(/(-?\d+(?:\.\d+)?)\s*만/);
      if (manMatch) return parseFloat(manMatch[1]) * 10000;
      // 일반 쉼표/문자 제거
      const num = s.replace(/[^\d.-]/g,'');
      return num ? parseFloat(num) : NaN;
    }

    /* ===== 커스텀 오버레이 ===== */
    class CustomPopup extends naver.maps.OverlayView {
      constructor(position, payload) {
        super();
        this._position = position;
        this._itemsSorted = payload.itemsSorted;
        this._currentFilter = payload.defaultFilter;
        this._pricePerSortDir = null; // null -> 'asc' -> 'desc' 토글 상태

        this._el = document.createElement('div');
        this._el.innerHTML = payload.html;
        this._container = this._el.firstElementChild;

        // 추가: 자동 스크롤 헬퍼
        const tableWrap = this._container.querySelector('.table-wrap');
        const tbody = this._container.querySelector('[data-tbody]');

          const rows = tbody ? tbody.querySelectorAll('tr').length : 0;

            tableWrap.style.maxHeight = '420px';    // 10행 정도 높이
            tableWrap.style.overflowY = 'auto';
          } else {
            tableWrap.style.maxHeight = '';
            tableWrap.style.overflowY = '';
          }
        };
        // 초기 적용
        applyAutoScroll();

        // 닫기
        this._container.querySelector('[data-close]')?.addEventListener('click', () => {
          this.setMap(null);
          if (currentOverlay === this) currentOverlay = null;
        });

        // 필터 클릭 (이벤트 위임)
        const filterBar = this._container.querySelector('[data-filterbar]');
        // const tbody = this._container.querySelector('[data-tbody]');
        if (filterBar && tbody) {
          filterBar.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            const f = btn.getAttribute('data-filter');
            if (!f || f === this._currentFilter) return;

            // 버튼 selected 토글
            filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            this._currentFilter = f;

            // 테이블 갱신
            tbody.innerHTML = buildRowsHTML(this._itemsSorted, this._currentFilter);
            // 정렬 상태 초기화 (필터 바꾸면 헤더 정렬도 초기화)
            this._pricePerSortDir = null;

            applyAutoScroll(); // ▼▼▼ 추가: 필터로 행 수 변동 시 적용
          });
        }
        // 정렬(거래일자)
        // === "거래일자" 헤더 클릭 시 정렬 토글(+ 화살표 표시) ===
        this._dateSortDir = null; // null -> 'asc' -> 'desc' 토글 상태
        const dateTh = this._container.querySelector('thead th:nth-child(2)');
        if (dateTh && tbody) {
          dateTh.style.cursor = 'pointer';
          dateTh.title = '거래일자로 정렬 (클릭 시 오름/내림차순 토글)';

          // 헤더 내부에 라벨/화살표 스팬이 없으면 주입
          let dateArrow = dateTh.querySelector('[data-date-arrow]');
          if (!dateArrow) {
            const label = document.createElement('span');
            label.textContent = '거래일자';
            const arrowSpan = document.createElement('span');
            arrowSpan.setAttribute('data-date-arrow', '');
            arrowSpan.className = 'sort-arrow';
            dateTh.textContent = '';            // 기존 텍스트 비우고
            dateTh.appendChild(label);          // 라벨
            dateTh.appendChild(arrowSpan);      // 화살표
            dateArrow = arrowSpan;
          }
          // ✅ 팝업 초기 표시 시 기본 화살표 표시
          dateArrow.textContent = '▲';  // 최신순(default)

          dateTh.addEventListener('click', () => {
            // 토글: null -> asc(오래된↑) -> desc(최신↓) -> asc ...
            this._dateSortDir = (this._dateSortDir === 'asc') ? 'desc' : 'asc';

            // 현재 필터 반영한 아이템
            const filtered = this._itemsSorted.filter(it => {
              return (this._currentFilter === 'all') || (it.type === this._currentFilter);
            });

            // 정렬: 날짜 파싱 (NaN/유효치 못한 날짜는 항상 뒤로)
            filtered.sort((a, b) => {
              const av = parseDateKey(a.date);
              const bv = parseDateKey(b.date);
              const aBad = !Number.isFinite(av) || av === -Infinity;
              const bBad = !Number.isFinite(bv) || bv === -Infinity;
              if (aBad && bBad) return 0;
              if (aBad) return 1;
              if (bBad) return -1;
              return this._dateSortDir === 'asc' ? (av - bv) : (bv - av);
            });

            // 렌더 (필터는 이미 적용했으니 'all'로 출력)
            tbody.innerHTML = buildRowsHTML(filtered, 'all');

            // 화살표 업데이트: asc=▲, desc=▼
            //dateArrow.textContent = (this._dateSortDir === 'asc') ? '▲' : '▼';
            dateArrow.textContent = (this._dateSortDir === 'asc') ? '▼' : '▲';

            applyAutoScroll(); // ▼▼▼ 추가: 정렬로 행 수/높이 변화 시 적용
          });
        }
        // 평당가 헤더 클릭 정렬
        // === "평당가" 헤더 클릭 시 정렬 토글 ===
        const pricePerTh = this._container.querySelector('th.price-per');
        if (pricePerTh && tbody) {
          pricePerTh.style.cursor = 'pointer';
          pricePerTh.title = '평당가로 정렬 (클릭 시 오름/내림차순 토글)';

          // 1) 헤더 내부에 라벨/화살표 스팬이 없으면 주입
          let arrow = pricePerTh.querySelector('[data-sort-arrow]');
          if (!arrow) {
            const label = document.createElement('span');
            label.textContent = '평당가';
            const arrowSpan = document.createElement('span');
            arrowSpan.setAttribute('data-sort-arrow', '');
            arrowSpan.className = 'sort-arrow';
            pricePerTh.textContent = ''; // 기존 텍스트 지우고
            pricePerTh.appendChild(label);
            pricePerTh.appendChild(arrowSpan);
            arrow = arrowSpan;
          }
          // ✅ 팝업 초기 표시 시 기본 화살표 표시
          arrow.textContent = '▲';  // 최신순(default)

          pricePerTh.addEventListener('click', () => {
            // 토글: null -> asc -> desc -> asc ...
            this._pricePerSortDir = (this._pricePerSortDir === 'asc') ? 'desc' : 'asc';

            // 현재 필터 반영한 아이템
            const filtered = this._itemsSorted.filter(it => {
              return (this._currentFilter === 'all') || (it.type === this._currentFilter);
            });

            // 정렬: NaN(숫자 아님)은 항상 뒤로
            filtered.sort((a, b) => {
              const av = parseCurrencyNumber(a.unitPrice);
              const bv = parseCurrencyNumber(b.unitPrice);
              const aNaN = Number.isNaN(av), bNaN = Number.isNaN(bv);
              if (aNaN && bNaN) return 0;
              if (aNaN) return 1;
              if (bNaN) return -1;
              return this._pricePerSortDir === 'asc' ? (av - bv) : (bv - av);
            });

            // 렌더
            tbody.innerHTML = buildRowsHTML(filtered, 'all');
            // buildRowsHTML의 필터는 이미 filtered에서 적용했으므로 'all'로 출력
            // 2) 화살표 업데이트
            arrow.textContent = (this._pricePerSortDir === 'asc') ? '▼' : '▲';

            applyAutoScroll(); // ▼▼▼ 추가: 정렬로 행 수/높이 변화 시 적용
          });
        }
        // === [ADD] "평수" 헤더 클릭 정렬 ===
        // 요구사항: 평수 기준 정렬(asc/desc 토글) + 2차 정렬은 '날짜 최신순(desc)'
        // (실거래/경매 구분 없이: 타입별 선정렬 없이 숫자→날짜로만 정렬)
        this._areaSortDir = null;
        const areaTh = this._container.querySelector('th.area-col');
        if (areaTh && tbody) {
          areaTh.style.cursor = 'pointer';
          areaTh.title = '평수로 정렬 (클릭 시 오름/내림차순 토글)';

          // 헤더에 라벨/화살표 주입
          let areaArrow = areaTh.querySelector('[data-area-arrow]');
          if (!areaArrow) {
              const label = document.createElement('span');
              label.textContent = '평수';
              const arrowSpan = document.createElement('span');
              arrowSpan.setAttribute('data-area-arrow', '');
              arrowSpan.className = 'sort-arrow';
              areaTh.textContent = '';          // 기존 텍스트 제거
              areaTh.appendChild(label);        // 라벨
              areaTh.appendChild(arrowSpan);    // 화살표
              areaArrow = arrowSpan;
          }
          // 초기 표시는 기본(정렬 전)이므로 화살표 공백 유지 또는 필요 시 '▼'로 표시 가능
          areaArrow.textContent = '▲';

          areaTh.addEventListener('click', () => {
            // 토글: null -> asc -> desc -> asc ...
            this._areaSortDir = (this._areaSortDir === 'asc') ? 'desc' : 'asc';

            // 현재 필터 상태 반영 (all/real/auction)
            const filtered = this._itemsSorted.filter(it => {
              return (this._currentFilter === 'all') || (it.type === this._currentFilter);
            });

            // 1차: 평수 숫자 정렬(오름/내림) — NaN은 항상 뒤
            // 2차: 날짜 최신순(desc)
            filtered.sort((a, b) => {
              const av = parseAreaNumber(a.area);
              const bv = parseAreaNumber(b.area);
              const aNaN = Number.isNaN(av), bNaN = Number.isNaN(bv);
              if (aNaN && bNaN) {
                // 둘 다 NaN이면 날짜 최신순(desc)만 비교
                const ad = parseDateKey(a.date);
                const bd = parseDateKey(b.date);
                return (bd - ad);
              }
              if (aNaN) return 1;
              if (bNaN) return -1;

              if (this._areaSortDir === 'asc') {
                if (av !== bv) return av - bv;
              } else {
                if (av !== bv) return bv - av;
              }
              // 평수가 같다면 날짜 최신순(desc)
              const ad = parseDateKey(a.date);
              const bd = parseDateKey(b.date);
              return (bd - ad);
            });

            // 렌더 (필터로 이미 거른 배열이므로 'all'로 출력)
            tbody.innerHTML = buildRowsHTML(filtered, 'all');

            // 화살표 업데이트
            areaArrow.textContent = (this._areaSortDir === 'asc') ? '▼' : '▲';

            applyAutoScroll(); // ▼▼▼ 추가: 정렬로 행 수/높이 변화 시 적용
          });
        }
        // === 여기까지 "평수" 정렬 추가 ===
      }

      onAdd() { this.getPanes().floatPane.appendChild(this._container); }
      draw() {
        const proj = this.getProjection(); if (!proj) return;
        const pos = proj.fromCoordToOffset(this._position);
        this._container.style.left = `${pos.x}px`;
        this._container.style.top  = `${pos.y}px`;
      }
      onRemove() {
        if (this._container?.parentNode) this._container.parentNode.removeChild(this._container);
        this._container = null;
      }
      setPosition(latlng) { this._position = latlng; this.draw(); }
    }

    /* ===== 렌더링 파이프라인 ===== */
    function moveMapToFallbackRegion() {
      const baseRow = buildCurrentSelectedBaseRow();

      const fallbackLat = parseFloat(baseRow.latitude || initialRequestedLatLng.lat || 0);
      const fallbackLng = parseFloat(baseRow.longitude || initialRequestedLatLng.lng || 0);

      if (fallbackLat && fallbackLng) {
        map.setCenter(new naver.maps.LatLng(fallbackLat, fallbackLng));
        map.setZoom(16);
        return;
      }

      const fallbackAddress = String(
        baseRow.address1 ||
        [selectedFullNm, selectedUmdNm].filter(Boolean).join(" ") ||
        initialRequestedLatLng.address ||
        ""
      ).trim();

      if (!fallbackAddress) return;

      naver.maps.Service.geocode({ query: fallbackAddress }, (status, response) => {
        if (status !== naver.maps.Service.Status.OK || !response?.v2?.addresses?.length) {
          return;
        }

        const addr = response.v2.addresses[0];
        const lat = parseFloat(addr.y || 0);
        const lng = parseFloat(addr.x || 0);

        if (!lat || !lng) return;

        map.setCenter(new naver.maps.LatLng(lat, lng));
        map.setZoom(16);
      });
    }

    function plotByType(type) {
      markers.forEach(m => m.setMap(null));
      markers = [];
      bounds = new naver.maps.LatLngBounds();

      if (currentOverlay) {
        currentOverlay.setMap(null);
        currentOverlay = null;
      }

      if (!Array.isArray(addresses) || addresses.length === 0) {
        moveMapToFallbackRegion();
        return;
      }

      const filtered = addresses.filter(a => type === 'all' || a.type === type);
      if (filtered.length === 0) {
        moveMapToFallbackRegion();
        return;
      }

      groups = groupByLocation(filtered);

      let doneCount = 0;
      const total = groups.length;

      groups.forEach(g => {
        geocodeIfNeeded(g, (result) => {
          doneCount++;

          if (result) {
            createCountMarker(g);
          }

          if (doneCount === total) {
            if (markers.length) {
              map.fitBounds(bounds);
              if (map.getZoom() > 16) {
                map.setZoom(16);
              }
            } else {
              moveMapToFallbackRegion();
            }
          }
        });
      });
    }

    function normalizeAssetTypeForControl(type) {
      const text = String(type || "").trim();

      if (text.includes("아파트")) return "아파트";
      if (
        text.includes("연립") ||
        text.includes("다세대") ||
        text.includes("빌라") ||
        text.includes("도시형생활주택") ||
        text.includes("단독주택") ||
        text.includes("오피스텔(주거)") ||
        text.includes("다가구")
      ) return "빌라";

      if (
        text.includes("근린상가") ||
        text.includes("근린생활주택")
      ) return "상가";

      return "상가";
    }

    async function restoreInitialSelectionState({ reloadMapData = true } = {}) {
      applySelectedLocationState(initialSelectionState);

      const regionEl = document.getElementById("npl-region-sample");
      const sggEl = document.getElementById("npl-sgg-sample");
      const lawdEl = document.getElementById("npl-lawd-sample");
      const mainEl = document.getElementById("npl-main-category-sample");

      const fullNm = String(initialSelectionState.fullNm || "").trim();
      const nameParts = fullNm.split(/\s+/).filter(Boolean);
      const regionName = nameParts[0] || "";
      const sggName = nameParts[1] || "";

      if (regionEl && regionName) {
        const regionOption = Array.from(regionEl.options || []).find(
          opt => String(opt.textContent || "").trim() === regionName
        );

        if (regionOption) {
          regionEl.value = regionOption.value;
          await regionCategoryData("region", regionOption.value, "");

          if (sggEl && sggName) {
            const sggOption = Array.from(sggEl.options || []).find(
              opt => String(opt.textContent || "").trim() === sggName
            );
            if (sggOption) {
              sggEl.value = sggOption.value;
              // ✅ [수정] applyInitialNplRegionData 와 동일하게 selectedLawdCd 명시적 갱신
              selectedLawdCd = sggOption.value;
            }
          }
        }
      }

      if (lawdEl) lawdEl.value = initialSelectionState.umdNm || "";
      // ✅ [수정] selectedUmdNm 도 명시적으로 다시 세팅 (applySelectedLocationState 이후 라인 위에서 초기화될 수 있으므로)
      selectedUmdNm = initialSelectionState.umdNm || "";

      // 타입도 초기값으로 맞춤
      setMainCategorySelectValueSafe(initialSelectionState.assetType || "");

      syncMapAssetTypeSelect(initialSelectionState.assetType);
      selectedAssetType = normalizeAssetTypeForControl(initialSelectionState.assetType || "상가");

    // =====================
    // [추가] 초기 지도 로딩 상태 표시 함수
    function setInitialMapLoading(show, regionText = "", message = "데이타를 가져오는 중입니다...") {
      const loadingEl = document.getElementById("initial-map-loading");
      const regionEl = document.getElementById("initial-map-loading-region");
      const textEl = document.getElementById("initial-map-loading-text");

      if (!loadingEl) return;

      if (regionEl) {
        regionEl.textContent = String(regionText || "지역을 확인중입니다").trim();
      }

      if (textEl) {
        textEl.textContent = String(message || "데이타를 가져오는 중입니다...").trim();
      }

      loadingEl.style.display = show ? "block" : "none";
    }

    // [수정] NPL 초기 지역정보 적용 함수
    // 부모창에서 전달받은 초기 지역정보(lawdCd, lawdName, umdName, type 등)를
    // 1) 현재 선택 상태에 반영
    // 2) 최초 원본 상태로 저장
    // 3) UI 반영
    // 4) 초기 실거래/경매 데이터 로드
    async function applyInitialNplRegionData(data, source = '') {
      if (!data) return false;

      console.log(`[${source || 'init'}] NPL 초기 지역정보 적용 시도`, data);

      const initialOpt = Array.isArray(data.options) && data.options.length
        ? data.options[0]
        : null;

      if (!initialOpt) return false;

      const regionEl = document.getElementById("npl-region-sample");
      const sggEl = document.getElementById("npl-sgg-sample");
      const lawdEl = document.getElementById("npl-lawd-sample");
      const mainEl = document.getElementById("npl-main-category-sample");

      const lawdCd = String(initialOpt.lawdCd || "").trim();
      const lawdName = String(initialOpt.lawdName || "").trim();
      const umdName = String(initialOpt.umdName || "").trim();
      const assetType = String(initialOpt.type || initialOpt.assetType || "").trim();
      // 경매지에서 바로가기로 위치를 이동하기 위해서 적용함.
      const latitude = parseFloat(initialOpt.latitude || initialOpt.lat || 0);
      const longitude = parseFloat(initialOpt.longitude || initialOpt.lng || 0);
      const address = String(initialOpt.address || "").trim();
      // 물건유형(아파트,빌라,상가), 감정가, 최저가 정보도 전달받을 수 있도록 추가 (향후 지도 마커/팝업에 활용 가능)
      const objectType = String(initialOpt.objectType || "").trim();
      const appraisalPrice = String(initialOpt.appraisalPrice || "").trim();
      const minimumPrice = String(initialOpt.minimumPrice || "").trim();

      if (!lawdCd && !lawdName && !umdName) {
        return false;
      }

      const inferredLawdCd = lawdCd || parseSidoCodeFromAddress(lawdName || address || "");
      const inferredFullNm = lawdName || splitAddressToRegionParts(address).fullNm || "";
      const inferredUmdNm = umdName || splitAddressToRegionParts(address).umdNm || "";

      if (latitude && longitude) {
        initialRequestedLatLng = {
          lat: latitude,
          lng: longitude,
          address: address || [inferredFullNm, inferredUmdNm].filter(Boolean).join(" ")
        };
      }

      // 1) 현재 선택 상태 반영
      applySelectedLocationState({
        lawdCd: inferredLawdCd,
        umdNm: inferredUmdNm,
        fullNm: inferredFullNm,
        assetType
      });

      // 2) 최초 원본 상태 저장
      // - message/url 로 여러번 들어올 수 있어도,
      //   원본값이 아직 없을 때만 저장
      if (!initialSelectionState.lawdCd && !initialSelectionState.umdNm && !initialSelectionState.fullNm) {
        saveInitialSelectionState({
          lawdCd: inferredLawdCd,
          umdNm: inferredUmdNm,
          fullNm: inferredFullNm,
          assetType
        });
      }

      console.log(`[${source || 'init'}] NPL 초기 지역정보 적용 완료`, {
        selectedLawdCd,
        selectedFullNm,
        selectedUmdNm,
        selectedAssetType,
        initialSelectionState
      });

      const nameParts = String(inferredFullNm || "").split(/\s+/).filter(Boolean);
      const regionName = nameParts[0] || "";
      const sggName = nameParts[1] || "";

      // 3) region 세팅
      if (regionEl && regionName) {
        const regionOption = Array.from(regionEl.options || []).find(
          opt => String(opt.textContent || "").trim() === regionName
        );

        if (regionOption) {
          regionEl.value = regionOption.value;

          await regionCategoryData("region", regionOption.value, "");

          if (sggEl && sggName) {
            const sggOption = Array.from(sggEl.options || []).find(
              opt => String(opt.textContent || "").trim() === sggName
            );

            if (sggOption) {
              sggEl.value = sggOption.value;
              selectedLawdCd = sggOption.value;
            }
          }
        }
      }

      // 4) 읍면동 input 세팅
      if (lawdEl) {
        lawdEl.value = umdName;
      }
      selectedUmdNm = inferredUmdNm;
      selectedFullNm = inferredFullNm;
      selectedLawdCd = inferredLawdCd;

      // 5) 타입 세팅
      setMainCategorySelectValueSafe(normalizeAssetTypeForControl(assetType));

      syncMapAssetTypeSelect(assetType);
      selectedAssetType = normalizeAssetTypeForControl(assetType || "상가");

      // 6) 초기 데이터 로드
      await loadInitialDealAuctionMapData();

      console.log(`[${source || 'init'}] NPL 초기 위치로 마커 표시`, { latitude, longitude, address });
      // 7) 경.공매 address 값이 있으면 해당 주소 위치로 단건 마커 표시
      if (latitude && longitude) {
        markInitialNplLatLng(
          latitude,
          longitude,
          assetType,
          lawdName || umdName || "선택 위치",
          address,
          objectType,
          appraisalPrice,
          minimumPrice
        );
      }
      return true;
    }

    function parseSidoCodeFromAddress(addressText = "") {
      const text = String(addressText || "").trim();

      if (text.startsWith("서울")) return "11";
      if (text.startsWith("부산")) return "26";
      if (text.startsWith("대구")) return "27";
      if (text.startsWith("인천")) return "28";
      if (text.startsWith("광주")) return "29";
      if (text.startsWith("대전")) return "30";
      if (text.startsWith("울산")) return "31";
      if (text.startsWith("세종")) return "36";
      if (text.startsWith("경기")) return "41";
      if (text.startsWith("강원")) return "42";
      if (text.startsWith("충북")) return "43";
      if (text.startsWith("충남")) return "44";
      if (text.startsWith("전북")) return "45";
      if (text.startsWith("전남")) return "46";
      if (text.startsWith("경북")) return "47";
      if (text.startsWith("경남")) return "48";
      if (text.startsWith("제주")) return "50";

      return "";
    }

    function splitAddressToRegionParts(addressText = "") {
      const parts = String(addressText || "").trim().split(/\s+/).filter(Boolean);
      return {
        fullNm: parts.slice(0, 2).join(" ").trim(),
        umdNm: parts[2] || "",
        regionNm: parts[0] || "",
        sggNm: parts[1] || ""
      };
    }

    async function resolveInitialRegionFromLatLng(lat, lng) {
      return new Promise((resolve) => {
        if (!lat || !lng) {
          resolve(null);
          return;
        }

        naver.maps.Service.reverseGeocode({
          coords: new naver.maps.LatLng(lat, lng),
          orders: [
            naver.maps.Service.OrderType.ADDR,
            naver.maps.Service.OrderType.ROAD_ADDR
          ].join(',')
        }, function(status, response) {
          if (status !== naver.maps.Service.Status.OK || !response?.v2?.results?.length) {
            resolve(null);
            return;
          }

          const result = response.v2.results[0];
          const region = result.region || {};
          const land = result.land || {};

          const sido = region.area1?.name || "";
          const sigungu = region.area2?.name || "";
          const dong = region.area3?.name || region.area4?.name || "";
          const lawdName = [sido, sigungu, dong].filter(Boolean).join(" ").trim();

          resolve({
            lawdCd: parseSidoCodeFromAddress(sido),   // 최소 시도코드라도 세팅
            lawdName: [sido, sigungu].filter(Boolean).join(" ").trim(),
            umdName: dong,
            address: land?.name
              ? `${lawdName} ${land.name}`.trim()
              : lawdName,
            latitude: lat,
            longitude: lng
          });
        });
      });
    }

    // =====================
    // [추가] URL 파라미터에서 NPL 초기 지역정보 읽어서 적용
    // 예: ?lawdCd=11110&lawdName=서울특별시+종로구+청운효자동&umdName=청운효자동
    async function readInitialNplRegionFromUrl() {
       /*
      const params = new URLSearchParams(window.location.search);
      let lawdCd = String(params.get("lawdCd") || "").trim();
      let lawdName = String(params.get("lawdName") || "").trim();

      const appraisalPrice = String(params.get("appraisalPrice") || "").trim();
      const minimumPrice = String(params.get("minimumPrice") || "").trim();
        */

      // 1. 서버에서 보낸 데이터를 JS 객체로 치환
      const serverParams = {
          assetType: "{{ assetType }}",
          lawdCd: "{{ lawdCd }}",
          lawdName: "{{ lawdName }}",
          umdName: "{{ umdName }}",
          objectType: "{{ objectType }}",
          address: "{{ address }}",

          minimumPrice: "{{ minimumPrice }}",
          latitude: parseFloat("{{ latitude }}") || 0,
          longitude: parseFloat("{{ longitude }}") || 0,
          token: "{{ access_token }}"
      };

      // 2. 기존 코드에서 params.get()을 사용하던 변수들을 매핑
      const assetType = serverParams.assetType;
      let lawdCd = serverParams.lawdCd;
      let lawdName = serverParams.lawdName;
      let umdName = serverParams.umdName;
      //
      let address = serverParams.address;
      const objectType = serverParams.objectType;
      const appraisalPrice = serverParams.appraisalPrice;
      const minimumPrice = serverParams.minimumPrice;
      const latitude = serverParams.latitude;
      const longitude = serverParams.longitude;

      console.log("[URL] 초기 지역정보 읽기", {
        lawdCd, lawdName, umdName, assetType, latitude, longitude, address
      });

      initialRequestedLatLng = {
        lat: latitude || 0,

      };

      // [추가] 초기 URL/서버 파라미터에 위경도가 있으면
      // 현재 선택 위치로 저장해 panel.js 에서 사용할 수 있게 함
      if (latitude && longitude) {
        setWishlistSelectedLocation({
          latitude: latitude,
          longitude: longitude,
          address: address,
          objectType: objectType
        });
      }

      // 1) 지역정보가 부족하고 위/경도가 있으면 reverse geocode로 보완
      if ((!lawdName || !umdName) && latitude && longitude) {
        const resolved = await resolveInitialRegionFromLatLng(latitude, longitude);

        if (resolved) {
          lawdCd = lawdCd || resolved.lawdCd || "";
          lawdName = lawdName || resolved.lawdName || "";
          umdName = umdName || resolved.umdName || "";
          address = address || resolved.address || "";

          console.log("[URL] reverse geocode 보완 완료", resolved);
        }
      }

      // 2) 여전히 lawdName이 없고 address만 있으면 텍스트 분해로 보완
      if ((!lawdName || !umdName) && address) {
        const parsed = splitAddressToRegionParts(address);

        lawdName = lawdName || parsed.fullNm || "";
        umdName = umdName || parsed.umdNm || "";
        lawdCd = lawdCd || parseSidoCodeFromAddress(parsed.regionNm || "");
      }

      // 3) 최소한 lat/lng만 있어도 applyInitialNplRegionData는 태우도록 함
      if (!lawdCd && !lawdName && !umdName && !latitude && !longitude) {

      return await applyInitialNplRegionData({

        }],

      }, "url");
    }

    // 지도 클릭 시 팝업 닫기

    // =========================
    // [추가] 상권정보 업종별 그룹화
    // - 1차: indsLclsNm(대분류)
    // - 2차: indsMclsNm(중분류)
    // =========================
    function groupCommercialAreaItems(items) {
      const safeItems = Array.isArray(items) ? items : [];
      const lclsMap = {};
      const totalCount = safeItems.length;

      safeItems.forEach(item => {
        const lclsName = (item.indsLclsNm || "기타").trim() || "기타";
        const mclsName = (item.indsMclsNm || "기타").trim() || "기타";

        if (!lclsMap[lclsName]) {
          lclsMap[lclsName] = {
            groupName: lclsName,
            count: 0,
            items: [],
            mclsMap: {}
          };
        }

        lclsMap[lclsName].count += 1;
        lclsMap[lclsName].items.push(item);

        if (!lclsMap[lclsName].mclsMap[mclsName]) {
          lclsMap[lclsName].mclsMap[mclsName] = {
            groupName: mclsName,
            count: 0,
            items: []
          };
        }

        lclsMap[lclsName].mclsMap[mclsName].count += 1;
        lclsMap[lclsName].mclsMap[mclsName].items.push(item);
      });

      const lclsGroups = Object.values(lclsMap)
        .map(group => {
          const mclsGroups = Object.values(group.mclsMap)
            .sort((a, b) => {
              if (b.count !== a.count) return b.count - a.count;
              return a.groupName.localeCompare(b.groupName, "ko");
            });

          return {
            groupName: group.groupName,
            count: group.count,
            items: group.items,
            mclsGroups: mclsGroups
          };
        })
        .sort((a, b) => {
          if (b.count !== a.count) return b.count - a.count;
          return a.groupName.localeCompare(b.groupName, "ko");
        });

      return {
        totalCount: totalCount,
        lclsGroups: lclsGroups
      };
    }

    // =========================
    // [추가] 상권분석 팝업
    // - 좌측: 대분류 목록 (전체/음식/숙박...)
    // - 우측: 선택 대분류의 중분류 그래프
    // =========================
    function commericalAreaPopupView() {
      const groupedData = currentCommercialAreaGrouped || {};
      const lclsGroups = groupedData.lclsGroups || [];
      const totalCount = groupedData.totalCount || 0;

      if (!lclsGroups.length) {
        alert("상권분석 데이터가 없습니다.");

      let detailGroups = [];

      if (name.includes("숙박")) return "🛏️";
      if (name.includes("소매")) return "🛍️";
      if (name.includes("교육")) return "🎓";
      if (name.includes("의료")) return "🏥";
      if (name.includes("부동산")) return "🏢";
      if (name.includes("시설관리")) return "🧰";
      if (name.includes("과학") || name.includes("기술")) return "🧪";
      if (name.includes("예술") || name.includes("스포츠")) return "🎭";
      if (name.includes("수리")) return "🔧";
      return "📍";
