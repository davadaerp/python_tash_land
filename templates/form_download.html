<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>양식다운로드 (트리 구조 및 검색)</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f8f9fa;
      margin: 20px;
      color: #333;
      text-align: center;
    }
    h1 {
      color: #007bff;
      margin-bottom: 20px;
    }
    .container {
      width: 90%;
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: left;
    }
    /* 검색 영역 */
    .search-bar {
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: flex-end; /* 오른쪽 정렬 */
    }
    .search-bar label {
      font-weight: bold;
      margin-right: 5px;
      color: #333;
    }
    .search-bar input {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 250px;
      font-size: 0.9rem;
    }

    /* 트리 구조 스타일 */
    .tree-container {
      max-height: 550px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      padding: 10px;
    }
    .folder-item {
      list-style: none;
      padding: 5px 0;
      border-bottom: 1px dotted #eee;
    }
    .folder-header {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      color: #007bff;
      padding: 5px 0;
    }
    .folder-header:hover {
      background-color: #f0f8ff;
    }
    .folder-header::before {
      content: '▶'; /* 닫힘 상태 */
      margin-right: 8px;
      transition: transform 0.2s;
    }
    .folder-header.open::before {
      content: '▼'; /* 열림 상태 */
      transform: rotate(0deg);
    }
    .file-list {
      list-style: none;
      padding-left: 20px;
      margin: 0;
      overflow: hidden;
      display: none; /* 기본적으로 숨김 */
    }
    .file-list.open {
        display: block; /* 검색 시 강제 열림 */
    }
    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 0.95rem;
      border-top: 1px solid #f8f9fa;
    }
    .file-item:hover {
        background-color: #f8f9fa;
    }
    .download-btn {
      padding: 4px 10px;
      font-size: 0.8rem;
      background-color: #28a745;
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .download-btn:hover {
      background-color: #1e7e34;
    }
    .file-name {
        flex-grow: 1; /* 파일명이 공간을 차지하도록 */
    }
  </style>
<script>
  let allStructure = []; // 전체 구조 저장용

  // 파일 다운로드 처리
  function downloadFile(folderName, fileName) {
    const filePath = folderName + '/' + fileName;
    const url = '/api/form_down?path=' + encodeURIComponent(filePath);

    const a = document.createElement('a');
    a.href = url;
    a.download = '';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // 폴더 열고 닫기 토글
  function toggleFolder(folderIndex) {
    const folderHeader = document.getElementById(`folder-header-${folderIndex}`);
    const fileList = document.getElementById(`file-list-${folderIndex}`);

    // 검색으로 강제 열린 상태(.open)를 해제하지 않도록 주의
    if (!folderHeader.hasAttribute('data-search-result')) {
        if (fileList.style.display === 'block') {
            fileList.style.display = 'none';
            folderHeader.classList.remove('open');
            fileList.classList.remove('open'); // display: block 해제
        } else {
            fileList.style.display = 'block';
            folderHeader.classList.add('open');
            fileList.classList.add('open'); // display: block 설정
        }
    }
  }

  // 유니코드 정규화 + 소문자 변환
  function normalizeText(text) {
    return text.normalize("NFC").toLowerCase();
  }

  // 트리 구조 렌더링 함수
  function renderTree(structure, isSearch = false) {
    const treeContainer = document.getElementById('tree-view');
    let treeHtml = `<ul style="padding-left: 0;">`;

    structure.forEach((folder, index) => {
      // 검색 결과일 경우, 폴더가 자동으로 열리도록 isSearch 플래그를 사용
      const isOpen = isSearch;
      const displayStyle = isOpen ? 'block' : 'none';
      const headerClass = isOpen ? 'open' : '';
      const listClass = isOpen ? 'open' : '';
      const searchAttr = isOpen ? 'data-search-result="true"' : '';

      // 1. 폴더 헤더
      treeHtml += `<li class="folder-item">
                     <div class="folder-header ${headerClass}" id="folder-header-${index}"
                          onclick="toggleFolder(${index})" ${searchAttr}>
                       📁 ${folder.folderName}
                     </div>`;

      // 2. 파일 목록 (검색 결과에 따라 display 설정)
      treeHtml += `<ul class="file-list ${listClass}" id="file-list-${index}" style="display: ${displayStyle};">`;

      if (folder.files && folder.files.length > 0) {
        folder.files.forEach(fileName => {
          treeHtml += `<li class="file-item">
                         <span class="file-name">${fileName}</span>
                         <button class="download-btn"
                                 onclick="downloadFile('${folder.folderName}', '${fileName}')">
                           다운로드
                         </button>
                       </li>`;
        });
      } else {
        treeHtml += `<li class="file-item" style="color: #999;">(파일 없음)</li>`;
      }

      treeHtml += `</ul></li>`;
    });

    treeHtml += `</ul>`;

    if (structure.length === 0 && isSearch) {
        treeContainer.innerHTML = `<p style="text-align: center; color: #dc3545; font-weight: bold;">🔍 검색 결과가 없습니다.</p>`;
    } else if (structure.length === 0 && !isSearch) {
         treeContainer.innerHTML = `<p style="text-align: center; color: #999;">파일 구조를 불러오는 중...</p>`;
    } else {
        treeContainer.innerHTML = treeHtml;
    }
  }

  // 요청 1. 검색 기능 실행
  function filterTree() {
    const keyword = normalizeText(document.getElementById('search-input').value.trim());

    if (keyword === "") {
      renderTree(allStructure, false); // 공백이면 전체 목록 (검색 아님)
      return;
    }

    // 검색 결과 구조를 담을 배열
    const filteredStructure = [];

    allStructure.forEach(folder => {
      // 해당 폴더 내에서 검색 키워드를 포함하는 파일 필터링
      const matchingFiles = folder.files.filter(fileName =>
        normalizeText(fileName).includes(keyword)
      );

      // 매칭되는 파일이 하나라도 있으면, 해당 폴더를 결과 구조에 추가
      if (matchingFiles.length > 0) {
        // 중요한 점: 폴더 구조는 유지하되, 파일 목록은 매칭된 파일만 보여주도록 새 객체 생성
        filteredStructure.push({
          folderName: folder.folderName,
          files: matchingFiles
        });
      }
    });

    // 필터링된 구조를 렌더링하고, 검색 결과임을 표시 (폴더 자동 열림)
    renderTree(filteredStructure, true);
  }

  // 서버에서 목록 불러오기
  async function loadForms() {
    try {
      const res = await fetch('/api/form_list');
      if (!res.ok) throw new Error("파일 구조를 불러오지 못했습니다.");
      const data = await res.json();

      // 서버에서 받은 전체 구조 저장 및 렌더링
      allStructure = data.structure;
      renderTree(allStructure, false);

    } catch (e) {
      alert("❌ 오류: " + e.message + "\n(서버의 form_list() 함수를 확인해주세요.)");
      console.error(e);
    }
  }

  window.onload = loadForms;
</script>
</head>
<body>
  <h1>📂 양식 다운로드</h1>
  <div class="container">

    <div class="search-bar">
      <label for="search-input">파일명 검색:</label>
      <input type="text" id="search-input" onkeyup="filterTree()" placeholder="파일명 입력 (예: 신청서)">
    </div>

    <div class="tree-container" id="tree-view">
      <p style="text-align: center; color: #999;">파일 구조를 불러오는 중...</p>
    </div>
  </div>
</body>
</html>
