<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>랜드코어 무료체험 승인관리</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
            color: #0f172a;
        }

        .wrap {
            max-width: 1440px;
            margin: 0 auto;
            padding: 28px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            padding: 28px 30px;
            border-radius: 24px;
            background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
            color: #fff;
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.22);
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: 30px;
            font-weight: 900;
        }

        .hero p {
            margin: 0;
            opacity: 0.95;
            line-height: 1.6;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            padding: 18px;
            background: rgba(255,255,255,0.9);
            border: 1px solid #dbeafe;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .toolbar label {
            font-size: 14px;
            font-weight: 700;
            color: #334155;
        }

        .toolbar select,
        .toolbar button,
        .toolbar textarea {
            font: inherit;
        }

        .toolbar select {
            height: 42px;
            padding: 0 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: #fff;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 11px 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(37, 99, 235, 0.24);
        }

        .btn-gray {
            background: #e2e8f0;
            color: #334155;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.3fr 0.9fr;
            gap: 20px;
        }

        .panel {
            background: rgba(255,255,255,0.95);
            border: 1px solid #dbeafe;
            border-radius: 22px;
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .panel-head {
            padding: 18px 20px;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 900;
            font-size: 18px;
            color: #0f172a;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        }

        .table-wrap {
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #eff6ff;
            color: #1e3a8a;
            font-size: 13px;
            font-weight: 900;
            padding: 10px 8px;
            text-align: center;
            vertical-align: middle;
            border-bottom: 1px solid #dbeafe;
            word-break: keep-all;
        }

        tbody td {
            padding: 9px 8px;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
            vertical-align: middle;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tbody tr {
            cursor: pointer;
            transition: background 0.18s ease;
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        tbody tr.active {
            background: #eaf2ff;
        }

        /* 컬럼 폭 - panel 내부에 맞게 % 처리 */
        .col-id { width: 8%; }
        .col-status { width: 14%; }
        .col-name { width: 13%; }
        .col-email { width: 27%; }
        .col-phone { width: 18%; }
        .col-date { width: 20%; }

        /* 헤더 정렬 공통 */
        .th-left { text-align: left !important; }
        .th-center { text-align: center !important; }
        .th-right { text-align: right !important; }

        /* 데이터 정렬 공통 - 나중에 각 필드별 수정 쉽게 */
        .td-left { text-align: left !important; }
        .td-center { text-align: center !important; }
        .td-right { text-align: right !important; }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 76px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
        }

        .badge-pending {
            background: #fff7ed;
            color: #c2410c;
        }

        .badge-approved {
            background: #ecfdf3;
            color: #15803d;
        }

        .detail-body {
            padding: 20px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 12px 14px;
            margin-bottom: 18px;
            align-items: start;
        }

        .detail-grid .dt {
            font-size: 13px;
            font-weight: 900;
            color: #475569;
        }

        .detail-grid .dd {
            font-size: 14px;
            line-height: 1.7;
            color: #0f172a;
            word-break: break-word;
        }

        .approve-box {
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px dashed #cbd5e1;
        }

        .approve-box h3 {
            margin: 0 0 12px;
            font-size: 16px;
        }

        .approve-box textarea {
            width: 100%;
            min-height: 140px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px;
            resize: vertical;
            background: #fff;
        }

        .approve-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .empty {
            padding: 60px 20px;
            text-align: center;
            color: #64748b;
        }

        .message-box {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }

        .message-success {
            display: block;
            background: #ecfdf3;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .message-error {
            display: block;
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .table-wrap {
                overflow-x: auto;
            }

            table {
                min-width: 720px;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <section class="hero">
        <div>
            <h1>무료체험 승인관리</h1>
            <p>최근 무료체험 요청부터 확인하고, 선택 후 승인 메시지와 함께 승인 처리할 수 있습니다.</p>
        </div>
        <div>
            <button class="btn btn-primary" onclick="loadTrials()">새로고침</button>
        </div>
    </section>

    <div class="toolbar">
        <label for="approveStatus">상태</label>
        <select id="approveStatus">
            <option value="">전체</option>
            <option value="pending" selected>미승인</option>
            <option value="approved">승인완료</option>
        </select>
        <button class="btn btn-gray" onclick="loadTrials()">조회</button>
    </div>

    <div class="layout">
        <section class="panel">
            <div class="panel-head">무료체험 요청 목록</div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th class="col-id th-center">ID</th>
                        <th class="col-status th-center">상태</th>
                        <th class="col-name th-center">이름</th>
                        <th class="col-email th-center">이메일</th>
                        <th class="col-phone th-center">전화번호</th>
                        <th class="col-date th-center">요청일시</th>
                    </tr>
                    </thead>
                    <tbody id="trialTableBody">
                    <tr>
                        <td colspan="6" class="empty">데이터를 불러오는 중입니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <aside class="panel">
            <div class="panel-head">상세 / 승인</div>
            <div class="detail-body" id="detailPanel">
                <div class="empty">왼쪽 목록에서 무료체험 요청을 선택하세요.</div>
            </div>
        </aside>
    </div>
</div>

<script>
let trialItems = [];
let selectedTrialId = null;

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function getStatusBadge(status) {
    if (status === "approved") {
        return `<span class="badge badge-approved">승인완료</span>`;
    }
    return `<span class="badge badge-pending">미승인</span>`;
}

async function loadTrials() {
    const approveStatus = document.getElementById("approveStatus").value;

    const res = await fetch(`/api/admin/trials/list?approve_status=${encodeURIComponent(approveStatus)}&page=1&page_size=100`);
    const data = await res.json();

    const tbody = document.getElementById("trialTableBody");

    if (data.result !== "Success") {
        tbody.innerHTML = `<tr><td colspan="6" class="empty">목록 조회 실패: ${escapeHtml(data.message || "")}</td></tr>`;
        return;
    }

    trialItems = data.items || [];
    selectedTrialId = null;

    if (!trialItems.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty">조회된 무료체험 요청이 없습니다.</td></tr>`;
        document.getElementById("detailPanel").innerHTML = `<div class="empty">표시할 상세 정보가 없습니다.</div>`;
        return;
    }

    tbody.innerHTML = trialItems.map(item => `
        <tr onclick="selectTrial(${item.id})" id="trial-row-${item.id}">
            <td class="td-center">${item.id}</td>
            <td class="td-center">${getStatusBadge(item.approve_status || "pending")}</td>
            <td class="td-left">${escapeHtml(item.name)}</td>
            <td class="td-left">${escapeHtml(item.email)}</td>
            <td class="td-center">${escapeHtml(item.phone)}</td>
            <td class="td-center">${escapeHtml(item.created_at || "")}</td>
        </tr>
    `).join("");

    selectTrial(trialItems[0].id);
}

function selectTrial(trialId) {
    selectedTrialId = trialId;

    document.querySelectorAll("#trialTableBody tr").forEach(el => el.classList.remove("active"));
    const activeRow = document.getElementById(`trial-row-${trialId}`);
    if (activeRow) activeRow.classList.add("active");

    const item = trialItems.find(x => Number(x.id) === Number(trialId));
    if (!item) return;

    const defaultMessage = item.approved_message || `[랜드코어] ${item.name}님 무료체험 승인이 완료되었습니다. 설치 및 이용 안내는 별도로 전달드리겠습니다.`;

    document.getElementById("detailPanel").innerHTML = `
        <div class="detail-grid">
            <div class="dt">상태</div><div class="dd">${getStatusBadge(item.approve_status || "pending")}</div>
            <div class="dt">이름</div><div class="dd">${escapeHtml(item.name)}</div>
            <div class="dt">이메일</div><div class="dd">${escapeHtml(item.email)}</div>
            <div class="dt">전화번호</div><div class="dd">${escapeHtml(item.phone)}</div>
            <div class="dt">카테고리</div><div class="dd">${escapeHtml(item.category || "")}</div>
            <div class="dt">메모</div><div class="dd">${escapeHtml(item.memo || "")}</div>
            <div class="dt">요청일시</div><div class="dd">${escapeHtml(item.created_at || "")}</div>
            <div class="dt">승인일시</div><div class="dd">${escapeHtml(item.approved_at || "-")}</div>
        </div>

        <div class="approve-box">
            <h3>승인 메시지</h3>
            <textarea id="approvedMessage">${escapeHtml(defaultMessage)}</textarea>
            <div class="approve-actions">
                <button class="btn btn-primary" onclick="approveTrial()">선택 요청 승인</button>
                <button class="btn btn-gray" onclick="fillDefaultMessage()">기본 메시지 다시 넣기</button>
                <button type="button" class="btn btn-danger btn-small" onclick="deleteTrial(event, ${item.id})">삭제</button>
            </div>
            <div id="approveResult" class="message-box"></div>
        </div>
    `;
}

function fillDefaultMessage() {
    const item = trialItems.find(x => Number(x.id) === Number(selectedTrialId));
    if (!item) return;

    document.getElementById("approvedMessage").value =
        `[랜드코어] ${item.name}님 무료체험 승인이 완료되었습니다. 설치 및 이용 안내는 별도로 전달드리겠습니다.`;
}

async function approveTrial() {
    if (!selectedTrialId) {
        alert("승인할 무료체험 요청을 선택하세요.");
        return;
    }

    const approvedMessage = document.getElementById("approvedMessage").value.trim();
    const box = document.getElementById("approveResult");

    const res = await fetch("/api/admin/trials/approve", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: selectedTrialId,
            approved_message: approvedMessage
        })
    });

    const data = await res.json();

    if (data.result === "Success") {
        box.className = "message-box message-success";
        box.textContent = data.message + (data.sent_message ? ` / 메시지: ${data.sent_message}` : "");
        await loadTrials();
    } else {
        box.className = "message-box message-error";
        box.textContent = data.message || "승인 처리 실패";
    }
}

async function deleteTrial(event, trialId) {
    event.stopPropagation();

    if (!confirm(`무료체험 요청을 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.`)) {
        return;
    }

    const res = await fetch("/api/admin/trials/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: trialId })
    });

    const data = await res.json();

    if (data.result === "Success") {
        alert(data.message || "삭제되었습니다.");
        await loadTrials();
    } else {
        alert(data.message || "삭제 처리 실패");
    }
}

loadTrials();
</script>
</body>
</html>
