.nav-inner {

}

.logo {
    font-size: 26px;
    font-weight: 900;
    color: #1d4ed8;

}

.menu {
    display: flex;
    gap: 24px;

}

.menu a {

.menu .link-main {

/* 🔥 반짝이 효과 */
@keyframes blinkColor {

    50% {

/* hover 시 살짝 더 강조 */
.menu .link-main:hover {
    transform: translateY(-1px) scale(1.05);
}

/* 모바일 대응 */
@media (max-width: 640px) {
    .nav-inner {
        height: auto;
        padding: 16px 0;

        gap: 14px;

<script>
function openLandcorePanel() {
    try {
        if (typeof chrome !== "undefined" && chrome.runtime) {
            chrome.runtime.sendMessage({ type: "OPEN_SIDE_PANEL" });
        } else {
            alert("확장프로그램이 설치되어 있지 않습니다.");
        }
    } catch (e) {
        console.error(e);
        alert("확장 실행 실패");
    }
}
</script>
